            // Render projects function
            function renderProjects(projectsToRender = projects) {
                const grid = document.getElementById('projects-grid');
                grid.innerHTML = '';
                
                projectsToRender.forEach(project => {
                    const projectCard = document.createElement('div');
                    projectCard.className = 'project-card';
                    projectCard.setAttribute('data-tags', project.tags.join(' '));
                    
                    const tagsHTML = project.tags.map(tag => 
                        `<span class="project-tag">#${tag.replace('-', ' ')}</span>`
                    ).join('');
                    
                    const linksHTML = project.links.map(link => 
                        `<a href="${link.url}" class="project-link" target="_blank">${link.text}</a>`
                    ).join('');
                    
                    // Generate image - use custom image if available, otherwise use category-based placeholder
                    const getProjectImage = (project) => {
                        // If project has a custom image, use it
                        if (project.image) {
                            return project.image;
                        }
                        
                        // Otherwise fall back to category-based placeholders
                        const tags = project.tags;
                        if (tags.includes('machine-learning') || tags.includes('classification') || tags.includes('regression')) {
                            return 'https://via.placeholder.com/300x180/6e57e0/ffffff?text=ML+Project';
                        } else if (tags.includes('data-viz')) {
                            return 'https://via.placeholder.com/300x180/c1b6fc/333333?text=Data+Viz';
                        } else if (tags.includes('network-analysis')) {
                            return 'https://via.placeholder.com/300x180/8b5cf6/ffffff?text=Network';
                        } else if (tags.includes('statistics')) {
                            return 'https://via.placeholder.com/300x180/a855f7/ffffff?text=Statistics';
                        } else if (tags.includes('optimization')) {
                            return 'assests/img/projects/optimization-category.png';
                        } else {
                            return 'https://via.placeholder.com/300x180/7c3aed/ffffff?text=Project';
                        }
                    };
                    
                    // Legacy function for backwards compatibility
                    const getPlaceholderImage = (tags) => {
                        if (tags.includes('machine-learning') || tags.includes('classification') || tags.includes('regression')) {
                            return 'https://via.placeholder.com/300x180/6e57e0/ffffff?text=ML+Project';
                        } else if (tags.includes('data-viz')) {
                            return 'https://via.placeholder.com/300x180/c1b6fc/333333?text=Data+Viz';
                        } else if (tags.includes('network-analysis')) {
                            return 'https://via.placeholder.com/300x180/8b5cf6/ffffff?text=Network';
                        } else if (tags.includes('statistics')) {
                            return 'https://via.placeholder.com/300x180/a855f7/ffffff?text=Statistics';
                        } else if (tags.includes('optimization')) {
                            return 'https://via.placeholder.com/300x180/9333ea/ffffff?text=Optimization';
                        } else {
                            return 'assests/img/projects/optimization-category.png';
                        }
                    };
                    
                    projectCard.innerHTML = `
                        <div class="project-image">
                            <img src="${getProjectImage(project)}" alt="${project.title}" class="project-img">
                        </div>
                        <div class="project-content">
                            <div class="project-header">
                                <h3 class="project-title">${project.title}</h3>
                            </div>
                            <p class="project-description">${project.description}</p>
                            <div class="project-links">${linksHTML}</div>
                            <div class="project-tags">${tagsHTML}</div>
                        </div>
                    `;
                    
                    grid.appendChild(projectCard);
                });
            }

            // Filter functionality
            function filterProjects(filterTag) {
                if (filterTag === 'all') {
                    renderProjects(projects);
                } else {
                    const filtered = projects.filter(project => 
                        project.tags.includes(filterTag)
                    );
                    renderProjects(filtered);
                }
            }

            // Search functionality
            function searchProjects(searchTerm) {
                const filtered = projects.filter(project => 
                    project.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    project.description.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    project.tags.some(tag => tag.toLowerCase().includes(searchTerm.toLowerCase()))
                );
                renderProjects(filtered);
            }

            // Event listeners
            document.addEventListener('DOMContentLoaded', function() {
                // Initial render
                renderProjects();
                
                // Filter tag clicks
                document.querySelectorAll('.filter-tag').forEach(button => {
                    button.addEventListener('click', function() {
                        // Remove active class from all buttons
                        document.querySelectorAll('.filter-tag').forEach(btn => btn.classList.remove('active'));
                        // Add active class to clicked button
                        this.classList.add('active');
                        // Filter projects
                        filterProjects(this.getAttribute('data-filter'));
                    });
                });
                
                // Search input
                const searchInput = document.getElementById('search-input');
                let searchTimeout;
                searchInput.addEventListener('input', function() {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(() => {
                        const searchTerm = this.value.trim();
                        if (searchTerm === '') {
                            renderProjects();
                        } else {
                            searchProjects(searchTerm);
                        }
                        // Reset filter buttons when searching
                        if (searchTerm !== '') {
                            document.querySelectorAll('.filter-tag').forEach(btn => btn.classList.remove('active'));
                        }
                    }, 300);
                });
            });
        </script>
