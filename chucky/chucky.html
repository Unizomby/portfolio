<head>

  <style>
    :root {
      --brand: #6e57e0;
      --brand-dark: #5643c7;
      --brand-light: #ede9fb;
      --bg: #f5f4fb;
      --panel-bg: #ffffff;
      --border: #e2ddf7;
      --text: #1a1535;
      --text-muted: #6b6390;
      --bubble-user: #6e57e0;
      --bubble-bot: #f0eefb;
      --glow: 0 0 0 3px rgba(110,87,224,0.35), 0 4px 20px rgba(110,87,224,0.25);
      --radius: 0.875rem;
      --topbar-h: 52px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }


    /* ── Topbar ── */
    #topbar {
      height: var(--topbar-h);
      background: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      flex-shrink: 0;
      z-index: 10;
    }
    #topbar-brand {
      display: flex; align-items: center; gap: 0.625rem;
      font-weight: 700; font-size: 1.0625rem; color: var(--brand);
    }
    #topbar-brand .robot { font-size: 1.375rem; }
    #topbar-brand .tagline {
      font-size: 0.75rem; font-weight: 400;
      color: var(--text-muted); margin-top: 1px;
    }
    #settings-btn {
      background: none; border: none;
      font-size: 1.25rem; cursor: pointer;
      color: var(--text-muted); padding: 0.25rem 0.375rem;
      border-radius: 0.375rem; transition: color 0.2s, background 0.2s;
    }
    #settings-btn:hover { color: var(--brand); background: var(--brand-light); }

    /* ── Layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100vh;
    }
    #layout {
      display: flex; flex: 1; overflow: hidden;
      min-height: 0;
    }

    /* ── Chat Panel ── */
    #chat-panel {
      width: 55%; display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--panel-bg);
      min-height: 0;
    }

    #chat-messages {
      flex: 1; overflow-y: auto; padding: 1.25rem;
      display: flex; flex-direction: column; gap: 0.875rem;
      scroll-behavior: smooth;
      min-height: 0;
    }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .message-row {
      display: flex; gap: 0.5rem;
      align-items: flex-end;
    }
    .message-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 0.85rem;
      font-weight: 700;
    }
    .avatar.bot { background: var(--brand); color: #fff; }
    .avatar.user { background: var(--brand-light); color: var(--brand); }

    .bubble {
      max-width: 78%; padding: 0.6875rem 0.9375rem;
      border-radius: 1rem; font-size: 0.9rem; line-height: 1.55;
    }
    .bubble.bot {
      background: var(--bubble-bot); color: var(--text);
      border-bottom-left-radius: 0.25rem;
    }
    .bubble.user {
      background: var(--bubble-user); color: #fff;
      border-bottom-right-radius: 0.25rem;
    }
    .bubble.user a { color: #d9d3ff; }
    .bubble.bot a { color: var(--brand); }

    .proj-ref {
      display: inline-block;
      background: var(--brand-light); color: var(--brand);
      border: 1px solid var(--border); border-radius: 0.3rem;
      padding: 0 0.3rem; font-weight: 600; font-size: 0.85em;
      cursor: pointer; transition: background 0.15s;
    }
    .proj-ref:hover { background: var(--brand); color: #fff; }

    /* typing indicator */
    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 0.6875rem 0.9375rem;
      background: var(--bubble-bot); border-radius: 1rem;
      border-bottom-left-radius: 0.25rem;
      width: fit-content;
    }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--brand); opacity: 0.4;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* chat input */
    #chat-input-row {
      padding: 0.875rem 1rem;
      border-top: 1px solid var(--border);
      display: flex; gap: 0.625rem; align-items: flex-end;
      background: var(--panel-bg);
    }
    #chat-textarea {
      flex: 1; resize: none; border: 1.5px solid var(--border);
      border-radius: 0.625rem; padding: 0.625rem 0.75rem;
      font-size: 0.9rem; font-family: inherit;
      color: var(--text); background: var(--bg);
      outline: none; max-height: 120px; min-height: 42px;
      transition: border-color 0.2s;
      line-height: 1.45;
    }
    #chat-textarea:focus { border-color: var(--brand); box-shadow: var(--glow); }
    #send-btn {
      flex-shrink: 0; padding: 0.625rem 1.125rem;
      background: var(--brand); color: #fff;
      border: none; border-radius: 0.625rem;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      align-self: flex-end;
    }
    #send-btn:hover { background: var(--brand-dark); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Projects Panel ── */
    #projects-panel {
      width: 45%; display: flex; flex-direction: column;
      background: var(--bg);
      min-height: 0;
    }

    #panel-header {
      padding: 0.875rem 1rem 0.75rem;
      background: var(--bg);
      flex-shrink: 0;
    }
    #panel-title {
      font-size: 0.8125rem; font-weight: 700;
      color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 0.625rem;
    }
    #search-bar {
      width: 100%; padding: 0.5625rem 0.75rem;
      border: 1.5px solid var(--border); border-radius: 0.5rem;
      font-size: 0.875rem; font-family: inherit;
      background: var(--panel-bg); color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    #search-bar:focus { border-color: var(--brand); }

    #project-cards {
      flex: 1; overflow-y: auto;
      padding: 0 1rem 1rem;
      display: flex; flex-direction: column; gap: 0.625rem;
      min-height: 0;
    }
    #project-cards::-webkit-scrollbar { width: 5px; }
    #project-cards::-webkit-scrollbar-track { background: transparent; }
    #project-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    .project-card {
      background: var(--panel-bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      flex-shrink: 0;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.15s;
      cursor: default;
    }
    .project-card:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(110,87,224,0.1); }
    .project-card.highlighted {
      border-color: var(--brand);
      box-shadow: var(--glow);
    }

    .card-visual {
      height: 160px; width: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: rgba(255,255,255,0.85);
      flex-shrink: 0; overflow: hidden;
    }
    .card-visual img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top center;
    }

    .card-body { padding: 0.75rem 0.875rem 0.875rem; }

    .card-title {
      font-size: 0.875rem; font-weight: 700;
      color: var(--text); margin-bottom: 0.25rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.775rem; color: var(--text-muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 0.5rem;
    }
    .card-tags {
      display: flex; flex-wrap: wrap; gap: 0.25rem;
      margin-bottom: 0.5rem;
    }
    .tag {
      font-size: 0.675rem; padding: 0.15rem 0.45rem;
      background: var(--brand-light); color: var(--brand);
      border-radius: 999px; font-weight: 600;
    }
    .card-links {
      display: flex; flex-wrap: wrap; gap: 0.375rem;
    }
    .card-link {
      font-size: 0.725rem; font-weight: 600;
      color: var(--brand); text-decoration: none;
      border: 1px solid var(--border); border-radius: 0.375rem;
      padding: 0.175rem 0.5rem;
      transition: background 0.15s, color 0.15s;
    }
    .card-link:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

    .no-results {
      text-align: center; color: var(--text-muted);
      font-size: 0.875rem; padding: 2rem 1rem;
      display: none;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { overflow: auto; }
      #app { height: auto; }
      #layout { flex-direction: column; }
      #chat-panel { width: 100%; height: 60vh; }
      #projects-panel { width: 100%; height: auto; }
      #project-cards { max-height: 60vh; }
    }
  </style>

function categoryGradient(tags = [], category = '') {
  const haystack = (category + ' ' + tags.join(' ')).toLowerCase();
  if (/classification|regression|nlp|xgboost|random.forest/.test(haystack) && !/rag|llm|chatbot|claude|openai/.test(haystack))
    return 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
  if (/tableau|visualization|eda|dashboard|chart/.test(haystack))
    return 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
  if (/timeseries|forecast|anomaly|sarima|prophet/.test(haystack))
    return 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
  if (/optim|lp|linear.prog|critical.path|scheduling/.test(haystack))
    return 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
  if (/rag|llm|chatbot|claude|openai|ai|gpt/.test(haystack))
    return 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)';
  return 'linear-gradient(135deg, #6e57e0 0%, #8b74f0 100%)';
}

function categoryEmoji(tags = [], category = '') {
  const h = (category + ' ' + tags.join(' ')).toLowerCase();
  if (/rag|llm|chatbot|claude|openai|ai|gpt/.test(h)) return '🤖';
  if (/tableau|visualization|eda|dashboard/.test(h)) return '📊';
  if (/timeseries|forecast|anomaly/.test(h)) return '📈';
  if (/optim|lp|critical.path|scheduling/.test(h)) return '⚙️';
  if (/nlp|classification|regression|ml/.test(h)) return '🧠';
  return '💡';
}

function createCard(project) {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.id = 'card-' + project.id;
  card.dataset.searchText = (project.title + ' ' + project.description + ' ' + project.tags.join(' ')).toLowerCase();

  const visualEl = document.createElement('div');
  visualEl.className = 'card-visual';

  if (project.screenshot) {
    const img = document.createElement('img');
    img.src = project.screenshot;
    img.alt = project.title;
    img.onerror = () => {
      img.remove();
      visualEl.textContent = categoryEmoji(project.tags, project.category);
      visualEl.style.background = categoryGradient(project.tags, project.category);
    };
    visualEl.appendChild(img);
  } else {
    visualEl.style.background = categoryGradient(project.tags, project.category);
    visualEl.textContent = categoryEmoji(project.tags, project.category);
  }

  const body = document.createElement('div');
  body.className = 'card-body';

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.textContent = project.title;

  const descEl = document.createElement('div');
  descEl.className = 'card-desc';
  descEl.textContent = project.description;

  const tagsEl = document.createElement('div');
  tagsEl.className = 'card-tags';
  (project.tags || []).slice(0, 5).forEach(t => {
    const span = document.createElement('span');
    span.className = 'tag';
    span.textContent = t.startsWith('#') ? t : '#' + t;
    tagsEl.appendChild(span);
  });

  const linksEl = document.createElement('div');
  linksEl.className = 'card-links';
  (project.links || []).forEach(link => {
    if (!link.url) return;
    const a = document.createElement('a');
    a.className = 'card-link';
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.textContent = link.label || 'View';
    linksEl.appendChild(a);
  });

  body.appendChild(titleEl);
  body.appendChild(descEl);
  if ((project.tags || []).length) body.appendChild(tagsEl);
  if ((project.links || []).length) body.appendChild(linksEl);

  card.appendChild(visualEl);
  card.appendChild(body);
  return card;
}

function buildProjectCards() {
  const container = document.getElementById('project-cards');
  const noResults = document.getElementById('no-results');
  container.innerHTML = '';
  container.appendChild(noResults);
  PROJECTS.forEach(p => container.appendChild(createCard(p)));
}

// ============================================================
// HIGHLIGHT
// ============================================================
let highlightTimers = {};

function highlightCard(projectId) {
  const card = document.getElementById('card-' + projectId);
  if (!card) return;

  if (highlightTimers[projectId]) clearTimeout(highlightTimers[projectId]);
  card.classList.add('highlighted');

  // Scroll card into view within the project-cards panel
  const panel = document.getElementById('project-cards');
  const cardTop = card.offsetTop - panel.offsetTop;
  const cardBottom = cardTop + card.offsetHeight;
  const panelVisible = panel.scrollTop + panel.clientHeight;
  if (cardTop < panel.scrollTop || cardBottom > panelVisible) {
    panel.scrollTo({ top: cardTop - 8, behavior: 'smooth' });
  }

  highlightTimers[projectId] = setTimeout(() => {
    card.classList.remove('highlighted');
    delete highlightTimers[projectId];
  }, 8000);
}

// ============================================================
// SEARCH
// ============================================================
function filterCards(query) {
  const q = query.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.project-card').forEach(card => {
    const match = !q || card.dataset.searchText.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('no-results').style.display = visible === 0 ? 'block' : 'none';
}

function parseProjectRefs(text) {
  // Build a lookup by normalized title
  const titleMap = {};
  PROJECTS.forEach(p => {
    titleMap[p.title.toLowerCase()] = p.id;
    // also try id-based matching
    titleMap[p.id.replace(/-/g, ' ')] = p.id;
  });

  const found = [];
  const html = text.replace(/\[\[([^\]]+)\]\]/g, (match, name) => {
    const id = titleMap[name.toLowerCase()] ||
      PROJECTS.find(p => p.title.toLowerCase().includes(name.toLowerCase()))?.id ||
      name.toLowerCase().replace(/\s+/g, '-');
    found.push(id);
    return `<span class="proj-ref" data-id="${id}" tabindex="0">${name}</span>`;
  });

  // Schedule highlights with 200ms stagger
  found.forEach((id, i) => {
    setTimeout(() => highlightCard(id), 200 + i * 200);
  });

  return html;
}

// ============================================================
// API — calls proxy worker, no key needed client-side
// ============================================================
async function callOpenAI(userMessage) {
  // Sliding window: keep last MAX_CONTEXT messages
  if (apiContext.length > MAX_CONTEXT) {
    apiContext = apiContext.slice(apiContext.length - MAX_CONTEXT);
  }

  const messages = [
    { role: 'system', content: buildSystemPrompt() },
    ...apiContext
  ];

  const response = await fetch(PROXY_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error('Error: ' + (err?.error?.message || response.statusText));
  }

  const data = await response.json();
  return data.choices[0].message.content;
}

// HANDLE SEND
// ============================================================
async function handleSend() {
  const textarea = document.getElementById('chat-textarea');
  const sendBtn = document.getElementById('send-btn');
  const userText = textarea.value.trim();
  if (!userText) return;

  textarea.value = '';
  textarea.style.height = 'auto';
  sendBtn.disabled = true;

  appendMessage('user', userText);

  // Add to context
  apiContext.push({ role: 'user', content: userText });

  showTypingIndicator();

  try {
    const reply = await callOpenAI(userText);
    hideTypingIndicator();

    if (reply) {
      apiContext.push({ role: 'assistant', content: reply });
      const html = parseProjectRefs(reply);
      appendMessage('bot', html, true);
    }
  } catch (err) {
    hideTypingIndicator();
    appendMessage('bot', '⚠️ ' + err.message);
  } finally {
    sendBtn.disabled = false;
    textarea.focus();
  }
}

// AUTO-RESIZE TEXTAREA
// ============================================================
function initTextarea() {
  const ta = document.getElementById('chat-textarea');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });
}
