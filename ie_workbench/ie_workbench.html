          symbol: 'H₀: μ₁ = μ₂ = … = μₖ',
          when: 'Compare the means of three or more independent groups simultaneously.',
          assumptions: ['Continuous data', 'Each group approximately normal (or n ≥ 30)', 'Homogeneity of variances (Levene\'s test)', 'Independent observations'],
          minitab: 'Stat → ANOVA → One-Way',
          color: '#f7971e'
        },
        'kw': {
          name: 'Kruskal-Wallis Test',
          symbol: 'H₀: all medians equal',
          when: 'Non-parametric alternative to one-way ANOVA for 3+ groups with non-normal data.',
          assumptions: ['Continuous or ordinal data', 'Independent samples', 'Similar distribution shapes across groups'],
          minitab: 'Stat → Nonparametrics → Kruskal-Wallis',
          color: '#ffd200'
        },
        'ftest': {
          name: "Levene's Test / F-Test for Equal Variances",
          symbol: 'H₀: σ₁² = σ₂²',
          when: 'Test whether the variance (spread) of two or more groups is the same.',
          assumptions: ['Continuous data', 'F-test assumes normality; Levene\'s is more robust to non-normality', 'Independent samples'],
          minitab: 'Stat → ANOVA → Test for Equal Variances',
          color: '#fa709a'
        },
        '1p': {
          name: '1-Proportion z-Test',
          symbol: 'H₀: p = p₀',
          when: 'Test whether a defect rate or pass/fail proportion equals a target value.',
          assumptions: ['Attribute (pass/fail) data', 'np ≥ 5 and n(1-p) ≥ 5', 'Random sample'],
          minitab: 'Stat → Basic Statistics → 1 Proportion',
          color: '#f093fb'
        },
        '2p': {
          name: '2-Proportion z-Test',
          symbol: 'H₀: p₁ = p₂',
          when: 'Compare defect rates or proportions from two independent groups.',
          assumptions: ['Attribute data from two independent groups', 'np ≥ 5 for each group'],
          minitab: 'Stat → Basic Statistics → 2 Proportions',
          color: '#f5576c'
        },
        'chi_gof': {
          name: 'Chi-Square Goodness-of-Fit',
          symbol: 'H₀: observed = expected distribution',
          when: 'Test if the observed frequency distribution matches an expected distribution across 3+ categories.',
          assumptions: ['Count/frequency data', 'Expected frequency ≥ 5 in each cell', 'Independent observations'],
          minitab: 'Stat → Tables → Chi-Square Goodness-of-Fit',
          color: '#fee140'
        },
        'chi_ind': {
          name: 'Chi-Square Test of Independence',
          symbol: 'H₀: variables are independent',
          when: 'Test whether two categorical variables are associated (e.g. shift vs. defect type).',
          assumptions: ['Categorical / count data in a contingency table', 'Expected frequency ≥ 5 in each cell', 'Independent observations'],
          minitab: 'Stat → Tables → Cross Tabulation and Chi-Square',
          color: '#43e97b'
        },
      };

      // ── Decision logic ──────────────────────────────────────────
      function selectTest(dataType, testGoal, groups, paired, normal) {
        if (!dataType) return null;

        if (dataType === 'continuous') {
          if (testGoal === 'variance') return TESTS['ftest'];
          // Mean comparisons
          if (groups === '1')  return normal === 'yes' ? TESTS['1t']   : TESTS['1w'];
          if (groups === '2') {
            if (paired === 'yes') return normal === 'yes' ? TESTS['pt']   : TESTS['wsr'];
            else                  return normal === 'yes' ? TESTS['2t']   : TESTS['mwu'];
          }
          if (groups === '3+') return normal === 'yes' ? TESTS['anova'] : TESTS['kw'];
        }

        if (dataType === 'attribute') {
          if (testGoal === 'association') return TESTS['chi_ind'];
          if (groups === '1')  return TESTS['1p'];
          if (groups === '2')  return TESTS['2p'];
          if (groups === '3+') return TESTS['chi_gof'];
        }
        return null;
      }

      // ── Which questions to show ──────────────────────────────────
      function visibleQuestions(dataType, testGoal, groups) {
        const show = { testGoal: !!dataType, groups: false, paired: false, normal: false };
        if (!dataType) return show;
        if (dataType === 'attribute' && testGoal === 'association') return show;
        show.groups = !!testGoal;
        if (dataType === 'continuous' && testGoal !== 'variance' && groups === '2') show.paired = true;
        if (dataType === 'continuous' && testGoal !== 'variance' && !!groups) show.normal = true;
        return show;
      }

      // ── Render ───────────────────────────────────────────────────
      function q(id, label, hint, options) {
        return `
          <div class="ht-question" id="wrap-${id}">
            <div class="ht-q-label">${label}</div>
            ${hint ? `<div class="ds-sublabel">${hint}</div>` : ''}
            <div class="ht-options">
              ${options.map(o => `
                <label class="ht-option">
                  <input type="radio" name="${id}" value="${o.value}">
                  <span class="ht-option-text">
                    <span class="ht-option-title">${o.label}</span>
                    ${o.hint ? `<span class="ht-option-hint">${o.hint}</span>` : ''}
                  </span>
                </label>`).join('')}
            </div>
          </div>`;
      }

      container.innerHTML = `
        <style>
          .ht-body        { display:flex; gap:1.5rem; padding:1.25rem 1.5rem; flex:1; overflow-y:auto; }
          .ht-questions   { flex:1; display:flex; flex-direction:column; gap:1rem; }
          .ht-result-col  { width:320px; flex-shrink:0; }
          .ht-question    { transition: opacity 0.2s; }
          .ht-question.hidden { opacity:0.25; pointer-events:none; }
          .ht-q-label     { font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--primary); margin-bottom:0.3rem; }
          .ht-options     { display:flex; flex-direction:column; gap:0.3rem; }
          .ht-option      { display:flex; align-items:flex-start; gap:0.5rem; padding:0.45rem 0.65rem; border:1.5px solid var(--border); border-radius:var(--radius-btn); cursor:pointer; transition:border-color 0.2s, background 0.2s; }
          .ht-option:hover { border-color:var(--primary); background:var(--primary-light); }
          .ht-option input[type=radio] { margin-top:0.15rem; accent-color:var(--primary); flex-shrink:0; }
          .ht-option input[type=radio]:checked ~ .ht-option-text { color:var(--primary); }
          .ht-option:has(input:checked) { border-color:var(--primary); background:var(--primary-light); }
          .ht-option-text  { display:flex; flex-direction:column; gap:0.1rem; }
          .ht-option-title { font-size:0.82rem; font-weight:600; color:var(--text); }
          .ht-option-hint  { font-size:0.72rem; color:var(--muted); }
          .ht-result       { background:var(--bg); border-radius:var(--radius-card); padding:1.1rem; border:2px solid var(--border); transition:border-color 0.3s; position:sticky; top:0; }
          .ht-result.active { border-color:var(--primary); }
          .ht-result-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); margin-bottom:0.5rem; }
          .ht-test-name    { font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:0.25rem; }
          .ht-test-symbol  { font-size:0.85rem; font-family:monospace; color:var(--primary); font-weight:600; background:var(--primary-light); padding:0.25rem 0.6rem; border-radius:var(--radius-btn); display:inline-block; margin-bottom:0.75rem; }
          .ht-detail-label { font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--muted); margin-top:0.75rem; margin-bottom:0.25rem; }
          .ht-detail-text  { font-size:0.8rem; color:var(--text); line-height:1.55; }
          .ht-assumption   { font-size:0.76rem; color:var(--muted); padding:0.15rem 0; display:flex; gap:0.4rem; }
          .ht-assumption::before { content:'✓'; color:var(--primary); font-weight:700; flex-shrink:0; }
          .ht-minitab      { margin-top:0.75rem; padding:0.5rem 0.65rem; background:#f0fdf4; border:1px solid #bbf7d0; border-radius:var(--radius-btn); font-size:0.73rem; color:#166534; font-family:monospace; }
          .ht-placeholder  { text-align:center; padding:2rem 1rem; color:var(--muted); font-size:0.82rem; line-height:1.7; }
          .ht-reset        { display:none; margin-top:0.75rem; padding:0.4rem 0.75rem; border:1.5px solid var(--border); border-radius:var(--radius-btn); background:transparent; font-family:var(--font); font-size:0.75rem; color:var(--muted); cursor:pointer; transition:all 0.2s; width:100%; }
          .ht-reset:hover  { border-color:var(--primary); color:var(--primary); }
          .ht-reset.visible { display:block; }
          @media(max-width:700px) { .ht-body { flex-direction:column; } .ht-result-col { width:100%; } }
        </style>
        <div class="ht-body">
          <div class="ht-questions">
            ${q('dataType', '① What type of data do you have?', null, [
              { value:'continuous', label:'Continuous (Variable)', hint:'Measurements: time, length, weight, temperature, cost…' },
              { value:'attribute',  label:'Discrete / Attribute',  hint:'Counts, pass/fail, proportions, categories…' }
            ])}
            ${q('testGoal', '② What are you testing?', 'Select based on your question — not what you hope to prove.', [
              { value:'mean',        label:'Location (Mean or Median)', hint:'Is the average shifting? Is one group higher than another?' },
              { value:'variance',    label:'Spread (Variance)',          hint:'Is one process more consistent than another? (continuous only)' },
              { value:'proportion',  label:'Proportion / Rate',          hint:'Is the defect rate different? (attribute only)' },
              { value:'association', label:'Association / Independence',  hint:'Are two categorical variables related? (attribute only)' },
            ])}
            ${q('groups', '③ How many groups or samples?', null, [
              { value:'1',  label:'1 group',          hint:'Compare one group to a target or specification' },
              { value:'2',  label:'2 groups',          hint:'Compare two groups or conditions' },
              { value:'3+', label:'3 or more groups',  hint:'Compare multiple levels of a factor' },
            ])}
            ${q('paired', '④ Are the two samples paired or independent?', 'Paired = same unit measured twice (before/after, two operators on same part).', [
              { value:'yes', label:'Paired',      hint:'Same subjects / units measured under both conditions' },
              { value:'no',  label:'Independent', hint:'Separate, unrelated groups' },
            ])}
            ${q('normal', '⑤ Is the data approximately normal?', 'Use normality test (Anderson-Darling) or apply CLT if n ≥ 30 per group.', [
              { value:'yes', label:'Yes — normal or large sample (n ≥ 30)', hint:'Use parametric test' },
              { value:'no',  label:'No — non-normal or small sample',        hint:'Use non-parametric test' },
            ])}
          </div>

          <div class="ht-result-col">
            <div class="ht-result" id="ht-result">
              <div class="ht-placeholder">Answer the questions on the left to get your recommended hypothesis test.</div>
            </div>
            <button class="ht-reset" id="ht-reset">↺ Start Over</button>
          </div>
        </div>`;

      // ── State & reactivity ───────────────────────────────────────
      const state = { dataType: null, testGoal: null, groups: null, paired: null, normal: null };
      const resultEl = container.querySelector('#ht-result');
      const resetBtn = container.querySelector('#ht-reset');

      function getVal(name) {
        const el = container.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : null;
      }

      function renderResult(test) {
        if (!test) {
          resultEl.innerHTML = '<div class="ht-placeholder">Keep answering — more context needed to make a recommendation.</div>';
          resultEl.classList.remove('active');
          return;
        }
        resultEl.classList.add('active');
        resultEl.style.borderColor = test.color;
        resultEl.innerHTML = `
          <div class="ht-result-label">Recommended Test</div>
          <div class="ht-test-name">${test.name}</div>
          <div class="ht-test-symbol">${test.symbol}</div>
          <div class="ht-detail-label">When to Use</div>
          <div class="ht-detail-text">${test.when}</div>
          <div class="ht-detail-label">Assumptions</div>
          ${test.assumptions.map(a => `<div class="ht-assumption">${a}</div>`).join('')}
          <div class="ht-detail-label">Minitab Path</div>
          <div class="ht-minitab">${test.minitab}</div>`;
      }

      function updateVisibility() {
        const vis = visibleQuestions(state.dataType, state.testGoal, state.groups);
        const map = { testGoal:'wrap-testGoal', groups:'wrap-groups', paired:'wrap-paired', normal:'wrap-normal' };
        Object.entries(map).forEach(([key, id]) => {
          const el = container.querySelector('#' + id);
          if (el) el.classList.toggle('hidden', !vis[key]);
        });

        // Filter out irrelevant options for testGoal based on dataType
        const meanOpt = container.querySelector('.ht-option:has(input[value="mean"])');
        const varOpt  = container.querySelector('.ht-option:has(input[value="variance"])');
        const propOpt = container.querySelector('.ht-option:has(input[value="proportion"])');
        const assocOpt= container.querySelector('.ht-option:has(input[value="association"])');
        if (state.dataType === 'continuous') {
          if (varOpt)   varOpt.style.display  = '';
          if (propOpt)  propOpt.style.display  = 'none';
          if (assocOpt) assocOpt.style.display = 'none';
        } else if (state.dataType === 'attribute') {
          if (varOpt)   varOpt.style.display   = 'none';
          if (propOpt)  propOpt.style.display   = '';
          if (assocOpt) assocOpt.style.display  = '';
        }
      }

      function onChange() {
        state.dataType = getVal('dataType');
        state.testGoal = getVal('testGoal');
        state.groups   = getVal('groups');
        state.paired   = getVal('paired');
        state.normal   = getVal('normal');

        // Clear downstream answers when upstream changes
        updateVisibility();

        const test = selectTest(state.dataType, state.testGoal, state.groups, state.paired, state.normal);
        renderResult(test);
        resetBtn.classList.toggle('visible', !!state.dataType);
      }

      container.querySelectorAll('input[type=radio]').forEach(r => r.addEventListener('change', onChange));

      resetBtn.addEventListener('click', () => {
        container.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
        Object.keys(state).forEach(k => state[k] = null);
        updateVisibility();
        renderResult(null);
        resetBtn.classList.remove('visible');
      });

      // Initial visibility pass
      updateVisibility();
    }
  },

];

/* ═══════════════════════════════════════════════════════════════════
   FILTER & RENDER GRID
═══════════════════════════════════════════════════════════════════ */
function filterTools() {
  return TOOL_REGISTRY.filter(tool => {
    const matchCat = activeCategory === 'all' || tool.category === activeCategory;
    const q = searchQuery;
    const matchSearch = !q
      || tool.name.toLowerCase().includes(q)
      || tool.description.toLowerCase().includes(q)
      || tool.tags.some(t => t.toLowerCase().includes(q))
      || (CATEGORIES[tool.category]?.label || '').toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function renderGrid() {
  const tools = filterTools();
  if (!tools.length) {
    toolGrid.innerHTML = '<p class="no-results">No tools found. Try a different search or category.</p>';
    return;
  }
  toolGrid.innerHTML = tools.map(renderCard).join('');
  toolGrid.querySelectorAll('.tool-card').forEach(card => {
    card.addEventListener('click', () => openTool(card.dataset.toolId));
  });
}

function renderCard(tool) {
  const cat = CATEGORIES[tool.category] || {};
  const tags = tool.tags.slice(0, 4).map(t => `<span class="tag-pill">${t}</span>`).join('');
  return `
    <div class="tool-card" data-tool-id="${tool.id}">
      <div class="card-header" style="background:${cat.gradient||'var(--primary)'}">
        <span class="card-emoji">${tool.emoji}</span>
        <span class="card-cat-label">${cat.label || tool.category}</span>
      </div>
      <div class="card-body">
        <div class="card-name">${tool.name}</div>
        <div class="card-desc">${tool.description}</div>
        <div class="card-tags">${tags}</div>
        <div class="card-open-hint">${tool.type === 'decision-support' ? 'Open Tool →' : 'Open Calculator →'}</div>
      </div>
    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   TOOL MODAL
═══════════════════════════════════════════════════════════════════ */
let activeTool = null;

function openTool(toolId) {
  const tool = TOOL_REGISTRY.find(t => t.id === toolId);
  if (!tool) return;
  activeTool = tool;

  const cat = CATEGORIES[tool.category] || {};
  const isDS = tool.type === 'decision-support';

  // Header (always the same)
  document.getElementById('modal-emoji').textContent = tool.emoji;
  document.getElementById('modal-tool-name').textContent = tool.name;
  const badge = document.getElementById('modal-cat-badge');
  badge.textContent = cat.label || tool.category;
  badge.style.background = cat.gradient || 'var(--primary)';

  // Wide modal for DS tools
  document.getElementById('modal-box').classList.toggle('wide', isDS);

  // Show/hide panels
  const calcEl = document.getElementById('modal-calc');
  const infoEl = document.getElementById('modal-info');
  const dsEl   = document.getElementById('modal-ds');
  calcEl.style.display = isDS ? 'none' : '';
  infoEl.style.display = isDS ? 'none' : 'flex';
  dsEl.style.display   = isDS ? 'flex' : 'none';

  if (isDS) {
    dsEl.innerHTML = '';
    tool.renderTool(dsEl);
  } else {
    // Standard calculator layout
    document.getElementById('info-description').textContent = tool.description;
    document.getElementById('info-formula').textContent = tool.formula;

    const howToEl = document.getElementById('info-howto');
    if (Array.isArray(tool.howToUse)) {
      howToEl.innerHTML = '<ul>' + tool.howToUse.map(s => `<li>${s}</li>`).join('') + '</ul>';
    } else {
      howToEl.innerHTML = `<p>${tool.howToUse}</p>`;
    }

    const exEl = document.getElementById('info-example');
    const ex = tool.example;
    const inputRows = Object.entries(ex.inputs)
      .map(([k,v]) => `<div class="example-row"><span>${k}</span><span>${v}</span></div>`).join('');
    exEl.innerHTML = `
      <div class="scenario">${ex.scenario}</div>
      ${inputRows}
      <div class="example-row result-row"><span>Result</span><span>${ex.output}</span></div>`;

    const inputsEl = document.getElementById('calc-inputs');
    inputsEl.innerHTML = tool.inputs.map(inp => `
      <div class="input-group" style="margin-bottom:0.75rem">
        <label class="input-label" for="inp-${inp.id}">${inp.label}</label>
        ${inp.tooltip ? `<span class="input-tooltip">${inp.tooltip}</span>` : ''}
        <input class="calc-input" type="${inp.type}" id="inp-${inp.id}"
          placeholder="${inp.placeholder || ''}" autocomplete="off">
      </div>`).join('');

    tool.inputs.forEach(inp => {
      document.getElementById('inp-' + inp.id)
        .addEventListener('input', () => runCalculation(tool));
    });

    document.getElementById('calc-results').innerHTML =
      '<div style="font-size:0.8rem;color:var(--muted);font-style:italic;padding:0.5rem 0;">Enter values above to see results.</div>';

    document.getElementById('inp-' + tool.inputs[0].id).focus();
  }

  toolModal.classList.add('open');
}

function closeToolModal() {
  toolModal.classList.remove('open');
  activeTool = null;
}

function runCalculation(tool) {
  const vals = {};
  tool.inputs.forEach(inp => {
    vals[inp.id] = parseFloat(document.getElementById('inp-' + inp.id).value) || 0;
  });
  const results = tool.calculate(vals);
  const el = document.getElementById('calc-results');
  if (!results.length) {
    el.innerHTML = '<div style="font-size:0.8rem;color:var(--muted);font-style:italic;padding:0.5rem 0;">Enter values above to see results.</div>';
    return;
  }
  el.innerHTML = results.map(r => `
    <div class="result-card ${r.type || ''}">
      <div class="result-label">${r.label}</div>
      <div class="result-value">${r.value}</div>
      <div class="result-unit">${r.unit}</div>
      ${r.note ? `<div class="result-note">${r.note}</div>` : ''}
    </div>`).join('');
}

// Close modal
document.getElementById('modal-close').addEventListener('click', closeToolModal);
toolModal.addEventListener('click', e => { if (e.target === toolModal) closeToolModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && toolModal.classList.contains('open')) closeToolModal(); });

/* ═══════════════════════════════════════════════════════════════════
   HIGHLIGHT TOOL
═══════════════════════════════════════════════════════════════════ */
function highlightTool(toolId) {
  // If a category filter is active that hides this tool, reset to all
  const tool = TOOL_REGISTRY.find(t => t.id === toolId);
  if (tool && activeCategory !== 'all' && activeCategory !== tool.category) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    document.querySelector('.cat-tab[data-cat="all"]').classList.add('active');
    activeCategory = 'all';
    renderGrid();
  }

  // Remove existing highlights
  document.querySelectorAll('.tool-card.highlighted').forEach(c => c.classList.remove('highlighted'));

  const card = document.querySelector(`.tool-card[data-tool-id="${toolId}"]`);
  if (card) {
    card.classList.add('highlighted');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    setTimeout(() => card.classList.remove('highlighted'), 8000);
  }
}

${toolList}

CRITICAL RULE: When recommending or referencing a tool, you MUST use the exact format [[Tool Name]] (double brackets, exact name). Example: [[Takt Time Calculator]]. This makes the tool clickable in the UI.

Be concise, practical, and enthusiastic. When a user describes a production problem, guide them to the right tool. If they give you numbers, walk them through the math. Keep responses under 200 words unless the user asks for detail.`;
}

function appendUserMessage(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML = `
    <div class="msg-bubble">${escapeHtml(text)}</div>
    <div class="msg-time">${timeNow()}</div>`;
  chatMessages.appendChild(wrap);
  scrollChat();
}

function appendBotMessage(text) {
  // Parse [[Tool Name]] references
  const html = text
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')   // *italic*
    .replace(/\[\[([^\]]+)\]\]/g, (_, name) => {
      const tool = TOOL_REGISTRY.find(t => t.name === name);
      if (!tool) return `<strong>${escapeHtml(name)}</strong>`;
      return `<span class="tool-ref" onclick="highlightTool('${tool.id}')">${escapeHtml(name)}</span>`;
    })
    .replace(/\n/g, '<br>');

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  wrap.innerHTML = `
    <div class="msg-bubble">${html}</div>
    <div class="msg-time">${timeNow()}</div>`;
  chatMessages.appendChild(wrap);
  scrollChat();
}

function scrollChat() {
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function timeNow() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function sendMessage() {
  const text = chatTextarea.value.trim();
  if (!text) return;

  chatTextarea.value = '';
  chatTextarea.style.height = 'auto';
  appendUserMessage(text);

  chatHistory.push({ role: 'user', content: text });
  if (chatHistory.length > MAX_CONTEXT) chatHistory.splice(0, 2);

  typingIndicator.classList.add('visible');
  scrollChat();
  sendBtn.disabled = true;

  try {
    const messages = [
      { role: 'system', content: buildSystemPrompt() },
      ...chatHistory
    ];
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    const data = await res.json();

    if (!res.ok) {
      const errMsg = data?.error?.message || `API error ${res.status}`;
      appendBotMessage(`Sorry, I ran into an error: ${errMsg}`);
      return;
    }

    const botText = data.choices?.[0]?.message?.content || 'No response received.';
    chatHistory.push({ role: 'assistant', content: botText });
    appendBotMessage(botText);

    const refs = [...botText.matchAll(/\[\[([^\]]+)\]\]/g)];
    refs.forEach(([, name], i) => {
      const tool = TOOL_REGISTRY.find(t => t.name === name);
      if (tool) setTimeout(() => highlightTool(tool.id), 300 + i * 250);
    });

  } catch (err) {
    appendBotMessage(`Connection error: ${err.message}. Check your network connection.`);
  } finally {
    typingIndicator.classList.remove('visible');
    sendBtn.disabled = false;
    scrollChat();
  }
}

// Send on button click or Enter (Shift+Enter = newline)
sendBtn.addEventListener('click', sendMessage);
chatTextarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Auto-resize textarea
chatTextarea.addEventListener('input', () => {
  chatTextarea.style.height = 'auto';
  chatTextarea.style.height = Math.min(chatTextarea.scrollHeight, 120) + 'px';
});

/* ── Session persistence ────────────────────────────────────────── */
function loadBuilderDraft() {
  try { return JSON.parse(localStorage.getItem('ie-builder-draft') || 'null'); } catch { return null; }
}
function saveBuilderDraft() {
  try { localStorage.setItem('ie-builder-draft', JSON.stringify(builderSession)); } catch {}
}
function loadBuilderSessions() {
  try { return JSON.parse(localStorage.getItem('ie-builder-sessions') || '[]'); } catch { return []; }
}
function saveBuilderSessionToStore() {
  const sessions = loadBuilderSessions();
  const now = new Date().toISOString();
  if (!builderSession.id) { builderSession.id = Date.now().toString(); builderSession.createdAt = now; }
  builderSession.updatedAt = now;
  const idx = sessions.findIndex(s => s.id === builderSession.id);
  if (idx >= 0) sessions[idx] = { ...builderSession };
  else sessions.unshift({ ...builderSession });
  if (sessions.length > 20) sessions.splice(20);
  try {
    localStorage.setItem('ie-builder-sessions', JSON.stringify(sessions));
    saveBuilderDraft();
    showToast('Session saved ✓');
  } catch { showToast('Could not save — storage full'); }
}
function deleteBuilderSession(id) {
  const sessions = loadBuilderSessions().filter(s => s.id !== id);
  try { localStorage.setItem('ie-builder-sessions', JSON.stringify(sessions)); } catch {}
  renderSessionsList();
}
function migrateStep(step) {
  if (step.current) return step; // already new format
  return { toolId: step.toolId, current: { inputs: step.inputs || {}, results: step.results || [] }, proposed: { inputs: {}, results: [] } };
}
function applyBuilderSession(session) {
  builderSession = JSON.parse(JSON.stringify(session));
  builderSession.steps = builderSession.steps.map(migrateStep);
  builderActiveStep = 0;
  builderScenario = 'current';
  refreshBuilderUI();
}

/* ── Steps list ─────────────────────────────────────────────────── */
function renderBuilderStepsList() {
  const list = document.getElementById('builder-steps-list');
  if (!builderSession.steps.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:0.78rem;padding:1.5rem 0.5rem;">No steps yet.<br>Add a tool to begin.</div>';
    return;
  }
  list.innerHTML = builderSession.steps.map((step, i) => {
    const tool = TOOL_REGISTRY.find(t => t.id === step.toolId);
    if (!tool) return '';
    const slot     = step[builderScenario] || { inputs: {}, results: [] };
    const isDone   = slot.results && slot.results.length > 0;
    const isActive = i === builderActiveStep;
    const preview  = isDone ? `${slot.results[0].value} ${slot.results[0].unit}` : '';
    const shortName = tool.name.replace(/ Calculator$/, '').replace(/ Helper$/, '');
    return `
      <div class="bstep-item ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}" onclick="setBuilderStep(${i})">
        <div class="bstep-num">${isDone && !isActive ? '✓' : i + 1}</div>
        <div class="bstep-info">
          <div class="bstep-name">${shortName}</div>
          ${preview ? `<div class="bstep-result-preview">${preview}</div>` : ''}
        </div>
        <button class="bstep-remove" onclick="event.stopPropagation();removeBuilderStep(${i})" title="Remove">✕</button>
      </div>`;
  }).join('');
}

function setBuilderStep(index) {
  builderActiveStep = index;
  renderBuilderStepsList();
  renderBuilderActiveStep();
}

function removeBuilderStep(index) {
  builderSession.steps.splice(index, 1);
  if (builderActiveStep >= builderSession.steps.length) {
    builderActiveStep = Math.max(0, builderSession.steps.length - 1);
  }
  saveBuilderDraft();
  renderBuilderStepsList();
  renderBuilderActiveStep();
  renderBuilderSummary();
}

/* ── Active step calculator ─────────────────────────────────────── */
function renderBuilderActiveStep() {
  const calcBody = document.getElementById('builder-calc-body');
  const stepEmoji = document.getElementById('builder-calc-step-emoji');
  const stepName  = document.getElementById('builder-calc-step-name');
  const stepNum   = document.getElementById('builder-calc-step-num');
  const prevBtn   = document.getElementById('builder-prev-btn');
  const nextBtn   = document.getElementById('builder-next-btn');

  if (!builderSession.steps.length) {
    calcBody.innerHTML = '<div class="empty-state">Choose a chain or add tools from the left panel.</div>';
    stepEmoji.textContent = ''; stepName.textContent = 'No steps yet'; stepNum.textContent = '';
    prevBtn.disabled = true; nextBtn.disabled = true;
    return;
  }
  prevBtn.disabled = false; nextBtn.disabled = false;

  const step = builderSession.steps[builderActiveStep];
  if (!step) return;
  const tool = TOOL_REGISTRY.find(t => t.id === step.toolId);
  if (!tool) { calcBody.innerHTML = '<div class="empty-state">Tool not found.</div>'; return; }

  // Ensure slot exists
  if (!step.current)  step.current  = { inputs: {}, results: [] };
  if (!step.proposed) step.proposed = { inputs: {}, results: [] };
  const slot = step[builderScenario];

  stepEmoji.textContent = tool.emoji;
  stepName.textContent  = tool.name;
  stepNum.textContent   = `Step ${builderActiveStep + 1} of ${builderSession.steps.length} — ${builderScenario === 'current' ? 'Current State' : 'Proposed State'}`;
  prevBtn.disabled = builderActiveStep === 0;
  nextBtn.textContent = builderActiveStep === builderSession.steps.length - 1 ? 'Finish ✓' : 'Next Step →';

  calcBody.innerHTML = `
    <div>
      <div class="bcalc-section-label">Inputs</div>
      ${tool.inputs.map(inp => `
        <div class="input-group" style="margin-bottom:0.75rem">
          <label class="input-label" for="binp-${inp.id}">${inp.label}</label>
          ${inp.tooltip ? `<span class="input-tooltip">${inp.tooltip}</span>` : ''}
          <input class="calc-input" type="${inp.type}" id="binp-${inp.id}"
            placeholder="${inp.placeholder || ''}" autocomplete="off"
            value="${slot.inputs[inp.id] !== undefined && slot.inputs[inp.id] !== 0 ? slot.inputs[inp.id] : ''}">
        </div>`).join('')}
    </div>
    <div>
      <div class="bcalc-section-label">Results</div>
      <div id="builder-calc-results">
        ${slot.results && slot.results.length
          ? builderResultsHTML(slot.results)
          : '<div style="font-size:0.8rem;color:var(--muted);font-style:italic;">Enter values above to see results.</div>'}
      </div>
    </div>`;

  tool.inputs.forEach(inp => {
    const el = document.getElementById('binp-' + inp.id);
    if (el) el.addEventListener('input', () => runBuilderCalc(tool, builderActiveStep));
  });
  const first = document.getElementById('binp-' + tool.inputs[0].id);
  if (first) setTimeout(() => first.focus(), 30);
}

function builderResultsHTML(results) {
  return results.map(r => `
    <div class="result-card ${r.type || ''}">
      <div class="result-label">${r.label}</div>
      <div class="result-value">${r.value}</div>
      <div class="result-unit">${r.unit}</div>
      ${r.note ? `<div class="result-note">${r.note}</div>` : ''}
    </div>`).join('');
}

function runBuilderCalc(tool, stepIndex) {
  const step = builderSession.steps[stepIndex];
  if (!step) return;
  if (!step.current)  step.current  = { inputs: {}, results: [] };
  if (!step.proposed) step.proposed = { inputs: {}, results: [] };
  const slot = step[builderScenario];
  const vals = {};
  tool.inputs.forEach(inp => {
    const el = document.getElementById('binp-' + inp.id);
    const val = el ? (parseFloat(el.value) || 0) : 0;
    vals[inp.id] = val;
    slot.inputs[inp.id] = val;
  });
  slot.results = tool.calculate(vals);
  const el = document.getElementById('builder-calc-results');
  if (el) {
    el.innerHTML = slot.results.length
      ? builderResultsHTML(slot.results)
      : '<div style="font-size:0.8rem;color:var(--muted);font-style:italic;">Enter values above to see results.</div>';
  }
  renderBuilderStepsList();
  renderBuilderSummary();
  saveBuilderDraft();
}

/* ── Delta helpers ──────────────────────────────────────────────── */
function parseNum(str) {
  const n = parseFloat(String(str).replace(/[^0-9.-]/g, ''));
  return isNaN(n) ? null : n;
}
function deltaChip(currVal, propVal) {
  const c = parseNum(currVal), p = parseNum(propVal);
  if (c === null || p === null || c === 0) return '';
  const pct = ((p - c) / Math.abs(c)) * 100;
  const cls  = pct > 0.5 ? 'up' : pct < -0.5 ? 'down' : 'neutral';
  const sign = pct >= 0 ? '+' : '';
  return `<span class="bdelta ${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

/* ── Summary panel ──────────────────────────────────────────────── */
function renderBuilderSummary() {
  const body = document.getElementById('builder-summary-body');
  const date = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });

  // Check if any step has proposed results
  const hasProposed = builderSession.steps.some(s => s.proposed && s.proposed.results && s.proposed.results.length);

  let html = `
    <div class="bsummary-meta">
      <div class="bsummary-meta-name">${escapeHtml(builderSession.name)}</div>
      <div class="bsummary-meta-date">${date}${hasProposed ? ' &middot; Current vs. Proposed' : ''}</div>
    </div>`;

  if (!builderSession.steps.length) {
    html += '<div style="text-align:center;color:var(--muted);font-size:0.78rem;padding:1rem 0;">No steps yet.</div>';
    body.innerHTML = html;
    return;
  }

  builderSession.steps.forEach((step) => {
    const tool = TOOL_REGISTRY.find(t => t.id === step.toolId);
    if (!tool) return;

    const curr = (step.current  || {});
    const prop = (step.proposed || {});
    const hasCurr = curr.results && curr.results.length > 0;
    const hasProp = prop.results && prop.results.length > 0;
    const hasAny  = hasCurr || hasProp;

    html += `<div class="bsummary-step ${hasAny ? 'has-result' : ''}">
      <div class="bsummary-step-name">${tool.emoji} ${tool.name.replace(/ Calculator$/, '').replace(/ Helper$/, '')}</div>`;

    if (hasCurr && hasProp) {
      // Comparison mode: match results by label
      html += '<div class="bsummary-step-results">';
      curr.results.forEach((r, i) => {
        const pr = prop.results[i];
        const chip = pr ? deltaChip(r.value, pr.value) : '';
        html += `<div class="bcomp-row">
          <span class="bcomp-label">${r.label}</span>
          <span class="bcomp-curr">${r.value}</span>
          <span class="bcomp-arrow">→</span>
          <span class="bcomp-prop">${pr ? pr.value : '—'}</span>
          ${chip}
        </div>`;
      });
      html += '</div>';
    } else if (hasCurr) {
      html += '<div class="bsummary-step-results">';
      curr.results.forEach(r => {
        html += `<div class="bsummary-result-row">
          <span class="bsummary-result-label">${r.label}</span>
          <span class="bsummary-result-value">${r.value} ${r.unit}</span>
        </div>`;
      });
      html += '</div>';
    } else {
      html += '<div class="bsummary-step-pending">Not yet calculated</div>';
    }
    html += '</div>';
  });

  body.innerHTML = html;
}

}

  if (builderActiveStep < builderSession.steps.length - 1) setBuilderStep(builderActiveStep + 1);
  else showToast('All steps complete — save your session!');
});
document.getElementById('builder-save-btn').addEventListener('click', saveBuilderSessionToStore);
document.getElementById('builder-sessions-btn').addEventListener('click', openSessionsDrawer);
document.getElementById('builder-add-tool-btn').addEventListener('click', openToolPicker);
document.getElementById('builder-print-btn').addEventListener('click', () => window.print());
document.getElementById('builder-print-btn-2').addEventListener('click', () => window.print());

// Chain picker events
document.getElementById('chain-picker-close').addEventListener('click', () => {
  document.getElementById('chain-picker-overlay').classList.remove('open');
  if (!builderSession.steps.length) initBuilderBlank();
});
document.getElementById('chain-custom-btn').addEventListener('click', () => {
  document.getElementById('chain-picker-overlay').classList.remove('open');
  initBuilderBlank();
});
document.getElementById('chain-picker-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('chain-picker-overlay')) {
    document.getElementById('chain-picker-overlay').classList.remove('open');
    if (!builderSession.steps.length) initBuilderBlank();
  }
});

// Sessions events
document.getElementById('sessions-close').addEventListener('click', () => {
  document.getElementById('sessions-overlay').classList.remove('open');
});
document.getElementById('sessions-new-btn').addEventListener('click', () => {
  document.getElementById('sessions-overlay').classList.remove('open');
  localStorage.removeItem('ie-builder-draft');
  builderSession = { id: null, name: 'New Scenario', chainId: null, createdAt: null, steps: [] };
  openChainPicker();
});
document.getElementById('sessions-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('sessions-overlay'))
    document.getElementById('sessions-overlay').classList.remove('open');
});

// Tool picker events
document.getElementById('tool-picker-search').addEventListener('input', e => renderToolPickerList(e.target.value));
document.getElementById('tool-picker-close').addEventListener('click', () => {
  document.getElementById('tool-picker-overlay').classList.remove('open');
});
document.getElementById('tool-picker-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('tool-picker-overlay'))
    document.getElementById('tool-picker-overlay').classList.remove('open');
});
</script>
</body>
</html>
