<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IE Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #6e57e0;
      --primary-dark:  #5a45cc;
      --primary-light: #ede9fb;
      --bg:            #f5f4fb;
      --surface:       #ffffff;
      --text:          #1a1535;
      --muted:         #6b6390;
      --border:        #e2ddf7;
      --radius-card:   0.75rem;
      --radius-btn:    0.5rem;
      --shadow:        0 2px 8px rgba(110,87,224,.12);
      --shadow-hover:  0 6px 20px rgba(110,87,224,.22);
      --font:          'Poppins', sans-serif;

      /* Category gradients */
      --grad-production:   linear-gradient(135deg,#4facfe,#00f2fe);
      --grad-time-studies: linear-gradient(135deg,#43e97b,#38f9d7);
      --grad-quality:      linear-gradient(135deg,#f7971e,#ffd200);
      --grad-lean:         linear-gradient(135deg,#11998e,#38ef7d);
      --grad-capacity:     linear-gradient(135deg,#667eea,#764ba2);
      --grad-labor:        linear-gradient(135deg,#f093fb,#f5576c);
      --grad-inventory:    linear-gradient(135deg,#fa709a,#fee140);
      --grad-six-sigma:    linear-gradient(135deg,#30cfd0,#5b2d8e);
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
    }

    /* ── App Shell ─────────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top Bar ───────────────────────────────────────────────────── */
    #top-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.25rem;
      height: 58px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(110,87,224,.08);
      flex-shrink: 0;
      z-index: 50;
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .logo-text {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text);
    }
    .logo-text strong { color: var(--primary); font-weight: 700; }

    #search-bar-wrap {
      flex: 1;
      max-width: 420px;
      position: relative;
    }

    #search-input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 2rem;
      background: var(--bg);
      font-family: var(--font);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(110,87,224,.15); }
    #search-input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 1rem; pointer-events: none;
    }

    #top-bar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 0.5rem;
    }

    /* ── Main Layout ───────────────────────────────────────────────── */
    #main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Chat Panel ────────────────────────────────────────────────── */
    #chat-panel {
      width: 35%;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    #chat-header {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .chat-avatar {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--primary), #8b74f0);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }

    .chat-header-info h3 { font-size: 0.875rem; font-weight: 600; color: var(--text); }
    .chat-header-info p  { font-size: 0.72rem; color: var(--muted); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; margin-left: auto; flex-shrink: 0;
    }
    .status-dot.offline { background: #94a3b8; }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      max-width: 88%;
    }
    .msg-wrap.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrap.bot  { align-self: flex-start; align-items: flex-start; }

    .msg-bubble {
      padding: 0.6rem 0.875rem;
      border-radius: 1rem;
      font-size: 0.82rem;
      line-height: 1.55;
    }
    .msg-wrap.user .msg-bubble {
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 0.25rem;
    }
    .msg-wrap.bot .msg-bubble {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 0.25rem;
    }

    .msg-time {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
      padding: 0 0.25rem;
    }

    /* Tool references inside chat */
    .tool-ref {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(110,87,224,.3);
      border-radius: 1rem;
      padding: 0.1rem 0.6rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .tool-ref:hover { background: var(--primary); color: #fff; transform: scale(1.03); }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      align-self: flex-start;
      padding: 0.6rem 0.875rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 1rem;
      border-bottom-left-radius: 0.25rem;
    }
    #typing-indicator.visible { display: flex; gap: 4px; align-items: center; }

    .typing-dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30%          { transform: translateY(-5px); }
    }

    #chat-input-wrap {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #chat-textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 0.75rem;
      padding: 0.55rem 0.75rem;
      font-family: var(--font);
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.5;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }
    #chat-textarea:focus { border-color: var(--primary); }
    #chat-textarea::placeholder { color: var(--muted); }

    #send-btn {
      width: 36px; height: 36px; flex-shrink: 0;
      background: var(--primary);
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover { background: var(--primary-dark); transform: scale(1.05); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    /* ── Tool Panel ────────────────────────────────────────────────── */
    #tool-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #category-tabs-wrap {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      overflow-x: auto;
      flex-shrink: 0;
    }
    #category-tabs-wrap::-webkit-scrollbar { height: 3px; }
    #category-tabs-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #category-tabs {
      display: flex;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .cat-tab {
      padding: 0.35rem 0.875rem;
      border-radius: 2rem;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-tab:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .cat-tab.active {
      color: #fff;
      border-color: transparent;
      background: var(--primary);
    }
    /* Category-specific active gradients */
    .cat-tab.active[data-cat="production"]   { background: var(--grad-production); }
    .cat-tab.active[data-cat="time-studies"] { background: var(--grad-time-studies); }
    .cat-tab.active[data-cat="quality"]      { background: var(--grad-quality); }
    .cat-tab.active[data-cat="lean"]         { background: var(--grad-lean); }
    .cat-tab.active[data-cat="capacity"]     { background: var(--grad-capacity); }
    .cat-tab.active[data-cat="labor"]        { background: var(--grad-labor); }
    .cat-tab.active[data-cat="inventory"]    { background: var(--grad-inventory); }
    .cat-tab.active[data-cat="six-sigma"]    { background: var(--grad-six-sigma); }

    #tool-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
    }

    #tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 1rem;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 3rem;
      font-size: 0.9rem;
    }

    /* ── Tool Card ─────────────────────────────────────────────────── */
    .tool-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      cursor: pointer;
      transition: box-shadow 0.25s, border-color 0.25s, transform 0.2s;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tool-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .tool-card.highlighted {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(110,87,224,.25), var(--shadow-hover);
      animation: pulse-glow 0.5s ease;
    }

    @keyframes pulse-glow {
      0%   { box-shadow: 0 0 0 0 rgba(110,87,224,.5); }
      50%  { box-shadow: 0 0 0 8px rgba(110,87,224,.2); }
      100% { box-shadow: 0 0 0 3px rgba(110,87,224,.25), var(--shadow-hover); }
    }

    .card-header {
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      position: relative;
      overflow: hidden;
    }
    .card-header::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(0,0,0,.08);
    }

    .card-emoji {
      font-size: 2.2rem;
      z-index: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.15));
    }

    .card-cat-label {
      z-index: 1;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,.92);
      background: rgba(0,0,0,.18);
      padding: 0.25rem 0.6rem;
      border-radius: 1rem;
    }

    .card-body { padding: 0.875rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; }

    .card-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.77rem;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.65rem;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .tag-pill {
      font-size: 0.68rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border-radius: 1rem;
      background: var(--primary-light);
      color: var(--primary);
    }

    .card-open-hint {
      font-size: 0.7rem;
      color: var(--primary);
      font-weight: 500;
      margin-top: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* ── Tool Modal ────────────────────────────────────────────────── */
    #tool-modal {
      position: fixed; inset: 0;
      background: rgba(20,10,50,.5);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    #tool-modal.open { display: flex; }

    #modal-box {
      background: var(--surface);
      border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.25);
      width: 100%;
      max-width: 860px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #modal-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #modal-emoji { font-size: 2rem; }

    #modal-title-wrap { flex: 1; }
    #modal-tool-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    #modal-cat-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #fff;
      padding: 0.2rem 0.65rem;
      border-radius: 1rem;
      margin-top: 0.2rem;
    }

    #modal-close {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #modal-close:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }

    #modal-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left: Calculator */
    #modal-calc {
      width: 42%;
      padding: 1.25rem 1.5rem;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .calc-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .input-group { display: flex; flex-direction: column; gap: 0.3rem; }

    .input-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
    }

    .input-tooltip {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .calc-input {
      padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-btn);
      font-family: var(--font);
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .calc-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(110,87,224,.15); }

    #results-section { margin-top: 0.5rem; }

    .result-card {
      background: var(--bg);
      border-radius: var(--radius-btn);
      padding: 1rem;
      margin-bottom: 0.5rem;
      border-left: 4px solid var(--primary);
    }
    .result-card.warning { border-left-color: #f59e0b; background: #fffbeb; }
    .result-card.good    { border-left-color: #22c55e; background: #f0fdf4; }
    .result-card.bad     { border-left-color: #ef4444; background: #fef2f2; }

    .result-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    .result-value { font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1.2; }
    .result-unit  { font-size: 0.82rem; color: var(--muted); margin-top: 0.1rem; }
    .result-note  { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; font-style: italic; }

    /* Right: Info */
    #modal-info {
      flex: 1;
      padding: 1.25rem 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .info-block h4 {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .info-block p, .info-block li {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
    }
    .info-block ul { padding-left: 1.1rem; display: flex; flex-direction: column; gap: 0.25rem; }

    .formula-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      font-family: 'Courier New', monospace;
      letter-spacing: 0.02em;
    }

    .example-box {
      background: #f8f7ff;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 0.875rem 1rem;
    }
    .example-box .scenario {
      font-size: 0.8rem;
      color: var(--text);
      font-style: italic;
      margin-bottom: 0.5rem;
    }
    .example-row {
      display: flex; justify-content: space-between;
      font-size: 0.78rem; color: var(--muted);
      padding: 0.15rem 0;
    }
    .example-row.result-row { color: var(--primary); font-weight: 600; border-top: 1px solid var(--border); margin-top: 0.35rem; padding-top: 0.35rem; }

    .btn-primary {
      flex: 1; padding: 0.6rem 1rem;
      background: var(--primary); color: #fff;
      border: none; border-radius: var(--radius-btn);
      font-family: var(--font); font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-ghost {
      padding: 0.6rem 1rem;
      background: transparent; color: var(--muted);
      border: 1.5px solid var(--border); border-radius: var(--radius-btn);
      font-family: var(--font); font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Toast ─────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(2rem);
      background: #1a1535; color: #fff;
      padding: 0.6rem 1.25rem;
      border-radius: 2rem;
      font-size: 0.82rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      z-index: 500;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Decision Support Tools ────────────────────────────────────── */
    #modal-box.wide { max-width: 1060px; }

    #modal-ds {
      display: none; flex: 1; overflow-y: auto;
      flex-direction: column;
    }

    .ds-body {
      display: flex; flex-direction: column;
      gap: 1.1rem; padding: 1.25rem 1.5rem;
    }

    .ds-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .ds-section { display: flex; flex-direction: column; gap: 0.35rem; }

    .ds-label {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--primary);
    }
    .ds-sublabel { font-size: 0.73rem; color: var(--muted); }

    .ds-textarea {
      width: 100%; padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-btn);
      font-family: var(--font); font-size: 0.82rem; color: var(--text);
      resize: vertical; min-height: 62px; outline: none;
      transition: border-color 0.2s; line-height: 1.55;
    }
    .ds-textarea:focus { border-color: var(--primary); }
    .ds-textarea.tall  { min-height: 90px; }

    /* 5 Whys chain */
    .why-chain { display: flex; flex-direction: column; }
    .why-step  { display: flex; gap: 0.75rem; align-items: flex-start; }
    .why-connector { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 0.35rem; }
    .why-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 0.7rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .why-line { width: 2px; background: var(--border); flex: 1; min-height: 10px; margin: 2px 0; }
    .why-step-body { flex: 1; padding-bottom: 0.6rem; }
    .why-step-label { font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 0.25rem; }
    .why-arrow {
      text-align: center; font-size: 1rem; color: var(--border);
      line-height: 1; padding: 0.1rem 0 0.1rem 12px;
    }

    /* Fishbone categories */
    .fishbone-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .fishbone-cat {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-btn); padding: 0.65rem 0.75rem;
    }
    .fishbone-cat-label {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.73rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem;
    }

    /* Before / After */
    .ba-table { width: 100%; border-collapse: collapse; }
    .ba-table th {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--muted);
      padding: 0.3rem 0.4rem; text-align: left;
      border-bottom: 2px solid var(--border);
    }
    .ba-table td { padding: 0.3rem 0.25rem; vertical-align: middle; }
    .ba-input {
      width: 100%; padding: 0.38rem 0.5rem;
      border: 1.5px solid var(--border); border-radius: var(--radius-btn);
      font-family: var(--font); font-size: 0.8rem; outline: none;
      transition: border-color 0.2s;
    }
    .ba-input:focus { border-color: var(--primary); }
    .ba-delta {
      font-size: 0.78rem; font-weight: 600;
      padding: 0.2rem 0.45rem; border-radius: var(--radius-btn); white-space: nowrap;
    }
    .ba-delta.up      { background: #f0fdf4; color: #16a34a; }
    .ba-delta.down    { background: #fef2f2; color: #dc2626; }
    .ba-delta.neutral { background: var(--bg); color: var(--muted); }
    .ba-remove {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.95rem; padding: 0.2rem 0.3rem;
      border-radius: 4px; transition: color 0.2s, background 0.2s;
    }
    .ba-remove:hover { color: #dc2626; background: #fef2f2; }
    .ba-add-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.875rem; border: 1.5px dashed var(--border);
      border-radius: var(--radius-btn); background: transparent;
      cursor: pointer; font-family: var(--font); font-size: 0.78rem;
      color: var(--muted); transition: all 0.2s; margin-top: 0.5rem;
    }
    .ba-add-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .ba-summary {
      display: flex; gap: 0.75rem; margin-top: 0.75rem;
      padding: 0.75rem; background: var(--bg); border-radius: var(--radius-btn);
    }
    .ba-summary-item { flex: 1; text-align: center; }
    .ba-summary-item .val { font-size: 1.3rem; font-weight: 700; }
    .ba-summary-item .lbl { font-size: 0.68rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── Builder Mode ───────────────────────────────────────────────── */
    #builder-layout { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    #builder-layout.active { display: flex; }

    #builder-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1.25rem;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #builder-scenario-name {
      font-family: var(--font); font-size: 0.95rem; font-weight: 600; color: var(--text);
      border: 1.5px solid transparent; border-radius: var(--radius-btn);
      padding: 0.3rem 0.6rem; background: transparent; outline: none;
      transition: border-color 0.2s; min-width: 180px; max-width: 300px;
    }
    #builder-scenario-name:focus { border-color: var(--primary); background: var(--bg); }
    #builder-chain-badge {
      font-size: 0.75rem; font-weight: 600; color: var(--primary);
      background: var(--primary-light); border-radius: 1rem; padding: 0.25rem 0.75rem; white-space: nowrap;
    }
    #builder-header-actions { margin-left: auto; display: flex; align-items: center; gap: 0.5rem; }
    .builder-btn {
      padding: 0.4rem 0.875rem; border-radius: var(--radius-btn);
      border: 1.5px solid var(--border); background: transparent;
      font-family: var(--font); font-size: 0.78rem; font-weight: 500;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .builder-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .builder-btn.primary { background: var(--primary); color: #fff; border-color: transparent; }
    .builder-btn.primary:hover { background: var(--primary-dark); }

    #builder-body { display: flex; flex: 1; overflow: hidden; }

    /* Steps column */
    #builder-steps-col {
      width: 220px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    #builder-steps-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .bsteps-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    #builder-add-tool-btn {
      font-size: 0.72rem; font-weight: 600; color: var(--primary);
      background: var(--primary-light); border: none; border-radius: 1rem;
      padding: 0.2rem 0.6rem; cursor: pointer; transition: background 0.2s;
    }
    #builder-add-tool-btn:hover { background: var(--primary); color: #fff; }
    #builder-steps-list {
      flex: 1; overflow-y: auto; padding: 0.5rem;
      display: flex; flex-direction: column; gap: 0.25rem;
    }
    .bstep-item {
      display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.65rem;
      border-radius: var(--radius-btn); cursor: pointer; transition: background 0.15s;
      border: 1.5px solid transparent;
    }
    .bstep-item:hover { background: var(--bg); }
    .bstep-item.active { background: var(--primary-light); border-color: rgba(110,87,224,.3); }
    .bstep-item.done .bstep-num { background: #22c55e; color: #fff; }
    .bstep-num {
      width: 22px; height: 22px; flex-shrink: 0; border-radius: 50%;
      background: var(--border); color: var(--muted);
      font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center;
    }
    .bstep-item.active .bstep-num { background: var(--primary); color: #fff; }
    .bstep-info { flex: 1; min-width: 0; }
    .bstep-name { font-size: 0.75rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bstep-item.active .bstep-name { color: var(--primary); font-weight: 600; }
    .bstep-result-preview { font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bstep-remove {
      background: none; border: none; cursor: pointer; color: transparent;
      font-size: 0.7rem; padding: 0 0.1rem; border-radius: 3px; transition: color 0.15s, background 0.15s; flex-shrink: 0;
    }
    .bstep-item:hover .bstep-remove { color: var(--muted); }
    .bstep-remove:hover { color: #dc2626 !important; background: #fef2f2; }

    /* Calculator column */
    #builder-calc-col {
      flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg);
    }
    #builder-calc-col-header {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.875rem 1.25rem;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    #builder-calc-step-emoji { font-size: 1.5rem; }
    #builder-calc-step-info { flex: 1; }
    #builder-calc-step-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    #builder-calc-step-num  { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }
    #builder-calc-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    #builder-calc-body .empty-state { text-align: center; color: var(--muted); font-size: 0.88rem; padding: 3rem 1rem; }
    .bcalc-section-label {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.6rem;
    }
    #builder-calc-nav {
      display: flex; gap: 0.75rem; padding: 0.875rem 1.25rem;
      border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0;
    }

    /* Summary column */
    #builder-summary-col {
      width: 280px; flex-shrink: 0; background: var(--surface);
      border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    #builder-summary-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .bsummary-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    #builder-summary-body { flex: 1; overflow-y: auto; padding: 0.875rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .bsummary-meta { background: var(--bg); border-radius: var(--radius-btn); padding: 0.75rem; margin-bottom: 0.25rem; }
    .bsummary-meta-name { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.2rem; }
    .bsummary-meta-date { font-size: 0.72rem; color: var(--muted); }
    .bsummary-step {
      background: var(--bg); border-radius: var(--radius-btn);
      padding: 0.65rem 0.75rem; border-left: 3px solid var(--border); transition: border-color 0.2s;
    }
    .bsummary-step.has-result { border-left-color: var(--primary); }
    .bsummary-step-name { font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 0.25rem; }
    .bsummary-step-results { display: flex; flex-direction: column; gap: 0.2rem; }
    .bsummary-result-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.72rem; }
    .bsummary-result-label { color: var(--muted); }
    .bsummary-result-value { font-weight: 700; color: var(--primary); text-align: right; padding-left: 0.5rem; }
    .bsummary-step-pending { font-size: 0.72rem; color: var(--muted); font-style: italic; }

    /* Scenario toggle */
    #scenario-toggle {
      display: flex; background: var(--bg); border-radius: var(--radius-btn);
      border: 1.5px solid var(--border); overflow: hidden; flex-shrink: 0;
    }
    .scenario-btn {
      padding: 0.32rem 0.875rem; border: none; background: transparent;
      font-family: var(--font); font-size: 0.75rem; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.18s; white-space: nowrap;
    }
    .scenario-btn.active { background: var(--primary); color: #fff; border-radius: calc(var(--radius-btn) - 1px); }
    .scenario-btn.proposed.active { background: #16a34a; }

    /* Comparison rows in summary */
    #builder-summary-col { width: 320px; }
    .bcomp-row {
      display: flex; align-items: baseline; gap: 0.3rem;
      font-size: 0.71rem; margin-top: 0.18rem;
    }
    .bcomp-label { color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bcomp-curr  { color: var(--muted); white-space: nowrap; }
    .bcomp-arrow { color: var(--border); font-size: 0.65rem; }
    .bcomp-prop  { color: var(--primary); font-weight: 700; white-space: nowrap; }
    .bdelta {
      font-size: 0.63rem; font-weight: 700; padding: 0.08rem 0.35rem;
      border-radius: 1rem; white-space: nowrap; flex-shrink: 0;
    }
    .bdelta.up      { background: #f0fdf4; color: #16a34a; }
    .bdelta.down    { background: #fef2f2; color: #dc2626; }
    .bdelta.neutral { background: var(--bg); color: var(--muted); }

    /* Overlays (chain picker, sessions, tool picker) */
    #chain-picker-overlay, #sessions-overlay, #tool-picker-overlay {
      position: fixed; inset: 0; background: rgba(20,10,50,.5);
      backdrop-filter: blur(4px); z-index: 300;
      display: none; align-items: center; justify-content: center; padding: 1.5rem;
    }
    #chain-picker-overlay.open, #sessions-overlay.open, #tool-picker-overlay.open { display: flex; }
    .overlay-box {
      background: var(--surface); border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(0,0,0,.25);
      width: 100%; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #chain-picker-box { max-width: 740px; }
    #sessions-box     { max-width: 560px; }
    #tool-picker-box  { max-width: 480px; }
    .overlay-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .overlay-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .overlay-close {
      width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border);
      background: transparent; cursor: pointer; font-size: 1rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center; transition: background 0.2s;
    }
    .overlay-close:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .overlay-body { padding: 1.25rem 1.5rem; overflow-y: auto; flex: 1; }

    /* Chain picker */
    .chain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 0.875rem; }
    .chain-card {
      background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-card);
      padding: 1rem; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .chain-card:hover { border-color: var(--primary); box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .chain-card-emoji { font-size: 1.6rem; margin-bottom: 0.4rem; }
    .chain-card-name  { font-size: 0.88rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
    .chain-card-desc  { font-size: 0.73rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.5rem; }
    .chain-card-steps { font-size: 0.65rem; font-weight: 600; color: var(--primary); background: var(--primary-light); border-radius: 1rem; padding: 0.15rem 0.55rem; display: inline-block; }
    .chain-custom-row { margin-top: 0.875rem; padding-top: 0.875rem; border-top: 1px solid var(--border); text-align: center; }

    /* Sessions */
    .sessions-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .session-item {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem;
      background: var(--bg); border-radius: var(--radius-btn); border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color 0.2s;
    }
    .session-item:hover { border-color: var(--primary); }
    .session-item-info { flex: 1; min-width: 0; }
    .session-item-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .session-item-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    .session-delete {
      background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 0.9rem; padding: 0.25rem; border-radius: 4px; transition: color 0.2s, background 0.2s;
    }
    .session-delete:hover { color: #dc2626; background: #fef2f2; }
    .sessions-empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); font-size: 0.88rem; }

    /* Tool picker */
    #tool-picker-search-wrap { margin-bottom: 0.875rem; position: relative; }
    #tool-picker-search {
      width: 100%; padding: 0.5rem 1rem 0.5rem 2.2rem;
      border: 1.5px solid var(--border); border-radius: 2rem;
      font-family: var(--font); font-size: 0.85rem; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    #tool-picker-search:focus { border-color: var(--primary); }
    #tool-picker-search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.9rem; pointer-events: none; }
    #tool-picker-list { display: flex; flex-direction: column; gap: 0.25rem; max-height: 360px; overflow-y: auto; }
    .tool-picker-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.55rem 0.75rem; border-radius: var(--radius-btn); cursor: pointer; transition: background 0.15s; }
    .tool-picker-item:hover { background: var(--primary-light); }
    .tool-picker-item-emoji { font-size: 1.1rem; flex-shrink: 0; }
    .tool-picker-item-info { flex: 1; min-width: 0; }
    .tool-picker-item-name { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .tool-picker-item-cat  { font-size: 0.68rem; color: var(--muted); }

    /* Mode toggle */
    .mode-toggle-btn {
      padding: 0.4rem 1rem; border-radius: var(--radius-btn); border: 1.5px solid var(--border);
      background: transparent; font-family: var(--font); font-size: 0.78rem; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
    }
    .mode-toggle-btn:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .mode-toggle-btn.active { background: var(--primary); color: #fff; border-color: transparent; }

    /* Print */
    @media print {
      #top-bar, #main-layout, #builder-steps-col, #builder-calc-col,
      #builder-header, #tool-modal, #chain-picker-overlay,
      #sessions-overlay, #tool-picker-overlay, #toast { display: none !important; }
      #builder-layout { display: block !important; overflow: visible !important; }
      #builder-body { display: block !important; }
      #builder-summary-col { width: 100% !important; border: none !important; display: block !important; }
      #builder-summary-body { overflow: visible !important; }
      .bsummary-step { break-inside: avoid; }
      .bsummary-meta-name { font-size: 1.2rem !important; }
    }

    /* ── Scrollbars ────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { overflow: auto; }
      #app { height: auto; min-height: 100vh; overflow: auto; }
      #main-layout { flex-direction: column; overflow: visible; }
      #chat-panel { width: 100%; min-width: unset; height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
      #tool-panel { height: auto; }
      #tool-grid-wrap { overflow-y: visible; }
      #modal-body { flex-direction: column; }
      #modal-calc { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- ── Tool Modal ─────────────────────────────────────────────────── -->
<div id="tool-modal">
  <div id="modal-box">
    <div id="modal-header">
      <div id="modal-emoji"></div>
      <div id="modal-title-wrap">
        <div id="modal-tool-name"></div>
        <div id="modal-cat-badge"></div>
      </div>
      <button id="modal-close" title="Close">✕</button>
    </div>
    <div id="modal-body">
      <!-- Calculator -->
      <div id="modal-calc">
        <div>
          <div class="calc-section-title">Inputs</div>
          <div id="calc-inputs"></div>
        </div>
        <div id="results-section">
          <div class="calc-section-title">Results</div>
          <div id="calc-results">
            <div style="font-size:0.8rem;color:var(--muted);font-style:italic;padding:0.5rem 0;">
              Enter values above to see results.
            </div>
          </div>
        </div>
      </div>
      <!-- Info -->
      <div id="modal-info">
        <div class="info-block">
          <h4>About this Tool</h4>
          <p id="info-description"></p>
        </div>
        <div class="info-block">
          <h4>Formula</h4>
          <div class="formula-box" id="info-formula"></div>
        </div>
        <div class="info-block">
          <h4>How to Use</h4>
          <div id="info-howto"></div>
        </div>
        <div class="info-block">
          <h4>Example</h4>
          <div class="example-box" id="info-example"></div>
        </div>
      </div>
      <!-- Decision Support (replaces calc+info for DS tools) -->
      <div id="modal-ds"></div>
    </div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────────── -->
<div id="app">

  <!-- Top Bar -->
  <div id="top-bar">
    <div id="logo">
      <div class="logo-icon">⚙️</div>
      <div class="logo-text">IE <strong>Workbench</strong></div>
    </div>

    <div id="search-bar-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search tools by name, keyword, or category…">
    </div>

    <div id="top-bar-right">
      <button class="mode-toggle-btn" id="builder-toggle-btn">📋 Builder</button>
    </div>
  </div>

  <!-- Main -->
  <div id="main-layout">

    <!-- Chat Panel -->
    <div id="chat-panel">
      <div id="chat-header">
        <div class="chat-avatar">🤖</div>
        <div class="chat-header-info">
          <h3>IE Assistant</h3>
          <p>Powered by Industrial Engineering tools</p>
        </div>
        <div class="status-dot" id="status-dot"></div>
      </div>

      <div id="chat-messages">
        <!-- Messages render here -->
      </div>

      <div id="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>

      <div id="chat-input-wrap">
        <textarea id="chat-textarea" rows="1" placeholder="Ask me which tool to use…"></textarea>
        <button id="send-btn" title="Send">➤</button>
      </div>
    </div>

    <!-- Tool Panel -->
    <div id="tool-panel">
      <div id="category-tabs-wrap">
        <div id="category-tabs">
          <button class="cat-tab active" data-cat="all">All Tools</button>
          <button class="cat-tab" data-cat="production">🏭 Production</button>
          <button class="cat-tab" data-cat="time-studies">⏱ Time Studies</button>

<script>
/* ═══════════════════════════════════════════════════════════════════
   TOOL REGISTRY
   Each tool is a plain object. Adding a tool = appending one object.
═══════════════════════════════════════════════════════════════════ */
const CATEGORIES = {
  'production':   { label: 'Production',          gradient: 'var(--grad-production)',   emoji: '🏭' },
  'time-studies': { label: 'Time Studies',         gradient: 'var(--grad-time-studies)', emoji: '⏱️' },
  'quality':      { label: 'Quality',              gradient: 'var(--grad-quality)',      emoji: '✅' },
  'lean':         { label: 'Lean Manufacturing',   gradient: 'var(--grad-lean)',         emoji: '♻️' },
  'capacity':     { label: 'Capacity Planning',    gradient: 'var(--grad-capacity)',     emoji: '📊' },
  'labor':        { label: 'Labor',                gradient: 'var(--grad-labor)',        emoji: '👷' },
  'inventory':    { label: 'Inventory / Ops',      gradient: 'var(--grad-inventory)',    emoji: '📦' },
  'six-sigma':    { label: 'Six Sigma',            gradient: 'var(--grad-six-sigma)',    emoji: '📐' },
};

const TOOL_REGISTRY = [

  /* ── 1. Takt Time ─────────────────────────────────────────────── */
  {
    id: 'takt-time',
    name: 'Takt Time Calculator',
    category: 'production',
    emoji: '⏱️',
    description: 'Determines the production rate required to satisfy customer demand within available time.',
    tags: ['takt', 'rate', 'demand', 'pacing', 'rhythm'],
    formula: 'Takt Time = Available Production Time ÷ Customer Demand',
    howToUse: [
      'Determine the net available production time per shift (subtract breaks, maintenance, and planned downtime).',
      'Identify the customer demand for the same period (e.g., units per shift).',
      'Divide available time by demand — the result is your takt time.',
      'Compare each work station\'s cycle time against takt time to spot bottlenecks.'
    ],
    example: {
      scenario: 'A factory runs an 8-hour shift with 30 min for breaks. Customers require 90 units per shift.',
      inputs: { 'Available Time': '450 min', 'Demand': '90 units' },
      output: '5.00 min/unit'
    },
    inputs: [
      { id: 'availTime', label: 'Available Production Time (min)', type: 'number', placeholder: '450', tooltip: 'Net time after subtracting breaks and downtime' },
      { id: 'demand',    label: 'Customer Demand (units/period)',  type: 'number', placeholder: '90',  tooltip: 'Units required in the same time period' }
    ],
    calculate(v) {
      if (!v.availTime || !v.demand) return [];
      const takt = v.availTime / v.demand;
      return [
        { label: 'Takt Time', value: takt.toFixed(2), unit: 'min / unit',
          note: `You must produce one unit every ${takt.toFixed(2)} minutes to meet demand.` }
      ];
    }
  },

  /* ── 2. Cycle Time ────────────────────────────────────────────── */
  {
    id: 'cycle-time',
    name: 'Cycle Time Calculator',
    category: 'time-studies',
    emoji: '🔄',
    description: 'Calculates the average actual time to complete one production cycle from a time study.',
    tags: ['cycle', 'time study', 'average', 'observation', 'stopwatch'],
    formula: 'Cycle Time = Total Observed Time ÷ Number of Observations',
    howToUse: [
      'Conduct a time study by observing and timing the process for multiple cycles.',
      'Record each cycle time and sum them for the total observed time.',
      'Divide the total by the number of observations to get average cycle time.',
      'Optionally enter a takt time to see if the process is keeping pace with demand.'
    ],
    example: {
      scenario: 'A time study of 10 cycles yields a total observed time of 52 minutes.',
      inputs: { 'Total Observed Time': '52 min', 'Observations': '10' },
      output: '5.20 min/unit'
    },
    inputs: [
      { id: 'totalTime', label: 'Total Observed Time (min)', type: 'number', placeholder: '52',  tooltip: 'Sum of all individual cycle times recorded' },
      { id: 'numObs',    label: 'Number of Observations',    type: 'number', placeholder: '10',  tooltip: 'How many cycles you timed' },
      { id: 'taktTime',  label: 'Takt Time (min) — optional', type: 'number', placeholder: '5.0', tooltip: 'Enter takt time to check if cycle time is within target' }
    ],
    calculate(v) {
      if (!v.totalTime || !v.numObs) return [];
      const ct = v.totalTime / v.numObs;
      const results = [
        { label: 'Average Cycle Time', value: ct.toFixed(2), unit: 'min / unit' }
      ];
      if (v.taktTime > 0) {
        const diff = ct - v.taktTime;
        if (diff > 0) {
          results.push({ label: 'vs. Takt Time', value: `+${diff.toFixed(2)}`, unit: 'min over takt', type: 'warning',
            note: '⚠️ Cycle time exceeds takt time — this station may be a bottleneck.' });
        } else {
          results.push({ label: 'vs. Takt Time', value: diff.toFixed(2), unit: 'min under takt', type: 'good',
            note: '✅ Cycle time is within takt time — this station is on pace.' });
        }
      }
      return results;
    }
  },

  /* ── 3. First Pass Yield ──────────────────────────────────────── */
  {
    id: 'first-pass-yield',
    name: 'First Pass Yield (FPY)',
    category: 'quality',
    emoji: '✅',
    description: 'Measures the percentage of units that pass through a process without defects on the first attempt.',
    tags: ['FPY', 'quality', 'yield', 'defect', 'inspection', 'first pass'],
    formula: 'FPY = (Units Passing First Inspection ÷ Total Units Started) × 100',
    howToUse: [
      'Count all units that entered the process during the period (Total Units Started).',
      'Count only units that passed inspection without any rework or scrap (Passing Units).',
      'Divide and multiply by 100 to get the FPY percentage.',
      'World-class FPY is typically ≥ 99%. FPY below 90% signals a critical quality problem.'
    ],
    example: {
      scenario: '500 units were started. 462 passed first inspection without defects.',
      inputs: { 'Units Passing': '462', 'Total Units Started': '500' },
      output: '92.40%'
    },
    inputs: [
      { id: 'passing', label: 'Units Passing First Inspection', type: 'number', placeholder: '462', tooltip: 'Units that passed without rework or scrap' },
      { id: 'total',   label: 'Total Units Started',           type: 'number', placeholder: '500', tooltip: 'All units that entered the process' }
    ],
    calculate(v) {
      if (!v.total) return [];
      const fpy = (v.passing / v.total) * 100;
      const defects = v.total - v.passing;
      let type = 'good';
      if (fpy < 80) type = 'bad';
      else if (fpy < 95) type = 'warning';
      return [
        { label: 'First Pass Yield', value: fpy.toFixed(2), unit: '%', type,
          note: fpy >= 95 ? '✅ Excellent quality level.' : fpy >= 80 ? '⚠️ Below world-class target of 95%.' : '🚨 Critical — major quality intervention needed.' },
        { label: 'Defective Units', value: defects, unit: 'units', note: `${((defects/v.total)*100).toFixed(1)}% defect rate` }
      ];
    }
  },

  /* ── 4. Lead Time ────────────────────────────────────────────── */
  {
    id: 'lead-time',
    name: 'Lead Time Calculator',
    category: 'production',
    emoji: '📅',
    description: 'Calculates total lead time by summing all components: process, wait, transport, and inspection time.',
    tags: ['lead time', 'delivery', 'wait', 'transport', 'process time'],
    formula: 'Lead Time = Process Time + Wait Time + Transport Time + Inspection Time',
    howToUse: [
      'Process Time: the actual time spent working on the product (value-added time).',
      'Wait Time: time the product sits idle between operations.',
      'Transport Time: time spent moving the product between locations.',
      'Inspection Time: time spent checking quality at various stages.',
      'The ratio of Process Time to Lead Time gives your Process Cycle Efficiency.'
    ],
    example: {
      scenario: 'A machined part has: 45 min process, 120 min wait, 15 min transport, 10 min inspection.',
      inputs: { 'Process': '45 min', 'Wait': '120 min', 'Transport': '15 min', 'Inspection': '10 min' },
      output: '190 min (3.17 hrs)'
    },
    inputs: [
      { id: 'processTime',  label: 'Process Time (min)',     type: 'number', placeholder: '45',  tooltip: 'Value-added time actually spent working' },
      { id: 'waitTime',     label: 'Wait / Queue Time (min)',type: 'number', placeholder: '120', tooltip: 'Idle time between operations' },
      { id: 'transportTime',label: 'Transport Time (min)',   type: 'number', placeholder: '15',  tooltip: 'Time spent moving the product' },
      { id: 'inspectTime',  label: 'Inspection Time (min)',  type: 'number', placeholder: '10',  tooltip: 'Time for quality checks' }
    ],
    calculate(v) {
      const total = (v.processTime||0) + (v.waitTime||0) + (v.transportTime||0) + (v.inspectTime||0);
      if (!total) return [];
      const pce = v.processTime ? (v.processTime / total * 100) : 0;
      let pceType = 'bad';
      if (pce >= 25) pceType = 'good';
      else if (pce >= 10) pceType = 'warning';
      return [
        { label: 'Total Lead Time', value: total.toFixed(1), unit: 'min', note: `${(total/60).toFixed(2)} hours` },
        { label: 'Process Cycle Efficiency', value: pce.toFixed(1), unit: '%', type: pceType,
          note: pce >= 25 ? '✅ Good efficiency (>25%).' : '⚠️ Lean target is >25% — reduce non-value-added time.' }
      ];
    }
  },

  /* ── 5. Throughput ───────────────────────────────────────────── */
  {
    id: 'throughput',
    name: 'Throughput Calculator',
    category: 'capacity',
    emoji: '🚀',
    description: 'Calculates the rate of units produced per unit of time, and projects capacity across different periods.',
    tags: ['throughput', 'rate', 'output', 'capacity', 'production rate', 'units per hour'],
    formula: 'Throughput = Units Produced ÷ Time Period',
    howToUse: [
      'Count the total units produced (or shipped) during the observed time period.',
      'Enter the time period in minutes.',
      'The calculator shows throughput per minute, per hour, and per 8-hour shift.',
      'Compare against required demand (takt rate) to assess capacity.'
    ],
    example: {
      scenario: 'A packaging line produces 240 units during a 60-minute observation.',
      inputs: { 'Units Produced': '240', 'Time Period': '60 min' },
      output: '4 units/min | 240 units/hr | 1,920 units/shift'
    },
    inputs: [
      { id: 'units',   label: 'Units Produced',       type: 'number', placeholder: '240', tooltip: 'Total good units completed in the period' },
      { id: 'timePer', label: 'Time Period (min)',     type: 'number', placeholder: '60',  tooltip: 'Duration of the observation or production run' },
      { id: 'demand',  label: 'Required Demand (units/hr) — optional', type: 'number', placeholder: '', tooltip: 'Your target output per hour for comparison' }
    ],
    calculate(v) {
      if (!v.units || !v.timePer) return [];
      const perMin = v.units / v.timePer;
      const perHr  = perMin * 60;
      const perShift = perMin * 480;
      const results = [
        { label: 'Throughput Rate', value: perMin.toFixed(2), unit: 'units / min' },
        { label: 'Per Hour',        value: Math.round(perHr), unit: 'units / hr',
          note: `${Math.round(perShift).toLocaleString()} units per 8-hr shift` }
      ];
      if (v.demand > 0) {
        const gap = perHr - v.demand;
        results.push({
          label: 'vs. Required Demand',
          value: gap >= 0 ? `+${Math.round(gap)}` : `${Math.round(gap)}`,
          unit: 'units/hr surplus' + (gap < 0 ? ' (shortfall)' : ''),
          type: gap >= 0 ? 'good' : 'bad',
          note: gap >= 0 ? '✅ Current throughput meets demand.' : '🚨 Capacity shortfall — throughput below required demand.'
        });
      }
      return results;
    }
  },

  /* ── 6. Rolled Throughput Yield (RTY) ────────────────────────── */
  {
    id: 'rty',
    name: 'Rolled Throughput Yield (RTY)',
    category: 'quality',
    emoji: '🔗',
    description: 'Calculates the probability that a unit passes through an entire multi-step process without a defect.',
    tags: ['RTY', 'rolled throughput yield', 'multi-step', 'process yield', 'quality chain'],
    formula: 'RTY = FPY₁ × FPY₂ × FPY₃ × … × FPYₙ',
    howToUse: [
      'Enter the First Pass Yield (as a decimal, e.g. 0.97 for 97%) for each process step.',
      'Leave a step blank if it doesn\'t apply — blank steps are ignored.',
      'RTY is the product of all step yields: it compounds quickly, so even small defect rates matter.',
      'A 6-step process with 97% yield at each step has RTY = 0.97⁶ ≈ 83.2%.'
    ],
    example: {
      scenario: 'A 4-step assembly process has step yields of 98%, 97%, 99%, and 95%.',
      inputs: { 'Step 1 FPY': '0.98', 'Step 2 FPY': '0.97', 'Step 3 FPY': '0.99', 'Step 4 FPY': '0.95' },
      output: 'RTY = 89.31%'
    },
    inputs: [
      { id: 's1', label: 'Step 1 FPY (decimal, e.g. 0.97)', type: 'number', placeholder: '0.98', tooltip: '1.0 = 100%, 0.95 = 95%' },
      { id: 's2', label: 'Step 2 FPY', type: 'number', placeholder: '0.97' },
      { id: 's3', label: 'Step 3 FPY', type: 'number', placeholder: '0.99' },
      { id: 's4', label: 'Step 4 FPY', type: 'number', placeholder: '0.95' },
      { id: 's5', label: 'Step 5 FPY (optional)', type: 'number', placeholder: '' },
      { id: 's6', label: 'Step 6 FPY (optional)', type: 'number', placeholder: '' },
    ],
    calculate(v) {
      const steps = [v.s1, v.s2, v.s3, v.s4, v.s5, v.s6].filter(x => x > 0);
      if (steps.length < 2) return [];
      const rty = steps.reduce((acc, x) => acc * x, 1);
      const rtyPct = rty * 100;
      let type = 'good';
      if (rtyPct < 70) type = 'bad';
      else if (rtyPct < 90) type = 'warning';
      return [
        { label: 'Rolled Throughput Yield', value: rtyPct.toFixed(2), unit: '%', type,
          note: `Across ${steps.length} steps. ${(100 - rtyPct).toFixed(2)}% of units will have at least one defect.` },
        { label: 'Defect Opportunity Loss', value: (100 - rtyPct).toFixed(2), unit: '% defective' }
      ];
    }
  },

  /* ── 7. Defect Rate Calculator ───────────────────────────────── */
  {
    id: 'defect-rate',
    name: 'Defect Rate Calculator',
    category: 'quality',
    emoji: '🔎',
    description: 'Computes Defects Per Unit (DPU), Defects Per Million Opportunities (DPMO), and estimated Sigma level.',
    tags: ['defect rate', 'DPU', 'DPMO', 'sigma', 'PPM', 'six sigma', 'quality'],
    formula: 'DPU = Defects ÷ Units  |  DPMO = (Defects ÷ (Units × Opportunities)) × 1,000,000',
    howToUse: [
      'Enter the total number of defects found (not defective units — one unit can have multiple defects).',
      'Enter total units inspected.',
      'Enter the number of defect opportunities per unit (distinct ways a defect could occur).',
      'DPMO maps to a Sigma level — 3.4 DPMO = Six Sigma performance.'
    ],
    example: {
      scenario: '35 defects found in 500 units, each with 8 opportunities for defects.',
      inputs: { 'Defects': '35', 'Units': '500', 'Opportunities/Unit': '8' },
      output: 'DPU = 0.07 | DPMO = 8,750 | ~3.9σ'
    },
    inputs: [
      { id: 'defects', label: 'Total Defects Found',            type: 'number', placeholder: '35',  tooltip: 'Count every defect, not just defective units' },
      { id: 'units',   label: 'Total Units Inspected',          type: 'number', placeholder: '500' },
      { id: 'opps',    label: 'Defect Opportunities per Unit',  type: 'number', placeholder: '8',   tooltip: 'Number of distinct ways a defect can occur on one unit' }
    ],
    calculate(v) {
      if (!v.units) return [];
      const dpu   = v.defects / v.units;
      const dpmo  = v.opps > 0 ? (v.defects / (v.units * v.opps)) * 1e6 : null;
      // Approximate sigma level from DPMO (simplified lookup)
      function dpmoToSigma(d) {
        if (d <= 3.4)   return 6.0;
        if (d <= 233)   return 5.0;
        if (d <= 6210)  return 4.0;
        if (d <= 66807) return 3.0;
        if (d <= 308537)return 2.0;
        return 1.0;
      }
      const results = [
        { label: 'Defects Per Unit (DPU)', value: dpu.toFixed(4), unit: 'defects/unit',
          note: `${(dpu * 100).toFixed(2)}% chance of a defect on any given unit.` }
      ];
      if (dpmo !== null) {
        const sigma = dpmoToSigma(dpmo);
        let type = 'good';
        if (dpmo > 66807) type = 'bad';
        else if (dpmo > 6210) type = 'warning';
        results.push(
          { label: 'DPMO', value: Math.round(dpmo).toLocaleString(), unit: 'defects per million opportunities', type },
          { label: 'Estimated Sigma Level', value: `~${sigma.toFixed(1)}σ`, unit: '', type,
            note: 'Six Sigma target = 3.4 DPMO (6.0σ)' }
        );
      }
      return results;
    }
  },

  /* ── 8. OEE Calculator ───────────────────────────────────────── */
  {
    id: 'oee',
    name: 'OEE Calculator',
    category: 'lean',
    emoji: '⚙️',
    description: 'Calculates Overall Equipment Effectiveness — the gold standard for measuring manufacturing productivity.',
    tags: ['OEE', 'availability', 'performance', 'quality rate', 'lean', 'equipment effectiveness'],
    formula: 'OEE = Availability × Performance × Quality',
    howToUse: [
      'Availability = Run Time ÷ Planned Production Time (accounts for unplanned downtime).',
      'Performance = (Ideal Cycle Time × Total Count) ÷ Run Time (accounts for slow cycles and minor stops).',
      'Quality = Good Count ÷ Total Count (accounts for defects and rework).',
      'World-class OEE is 85% or higher. Most manufacturers average around 60%.'
    ],
    example: {
      scenario: 'Planned time: 480 min. Downtime: 60 min. Ideal cycle: 1 min/unit. Total output: 380 units. Good units: 368.',
      inputs: { 'Planned Time': '480 min', 'Downtime': '60 min', 'Ideal Cycle': '1 min', 'Total Count': '380', 'Good Count': '368' },
      output: 'OEE = 72.0%'
    },
    inputs: [
      { id: 'plannedTime',  label: 'Planned Production Time (min)', type: 'number', placeholder: '480', tooltip: 'Total scheduled run time for the shift' },
      { id: 'downtime',     label: 'Unplanned Downtime (min)',       type: 'number', placeholder: '60',  tooltip: 'Breakdowns, material shortages, unplanned stops' },
      { id: 'idealCycle',   label: 'Ideal Cycle Time (min/unit)',    type: 'number', placeholder: '1',   tooltip: 'The theoretical fastest cycle time possible' },
      { id: 'totalCount',   label: 'Total Units Produced',           type: 'number', placeholder: '380' },
      { id: 'goodCount',    label: 'Good Units (no defects)',         type: 'number', placeholder: '368' }
    ],
    calculate(v) {
      if (!v.plannedTime || !v.totalCount) return [];
      const runTime     = v.plannedTime - (v.downtime || 0);
      const avail       = runTime / v.plannedTime;
      const perf        = v.idealCycle > 0 ? (v.idealCycle * v.totalCount) / runTime : 1;
      const qual        = v.goodCount > 0 ? v.goodCount / v.totalCount : 1;
      const oee         = avail * perf * qual * 100;
      let type = 'bad';
      if (oee >= 85) type = 'good';
      else if (oee >= 65) type = 'warning';
      return [
        { label: 'OEE', value: oee.toFixed(1), unit: '%', type,
          note: oee >= 85 ? '✅ World-class (≥85%).' : oee >= 65 ? '⚠️ Typical — target 85%+.' : '🚨 Below average — significant losses present.' },
        { label: 'Availability',  value: (avail * 100).toFixed(1), unit: '%' },
        { label: 'Performance',   value: (Math.min(perf, 1) * 100).toFixed(1), unit: '%' },

    ],

      const eff = v.efficiency > 0 ? v.efficiency : 1;

      if (v.demandUnits > 0) {

        results.push({

          value: gap >= 0 ? `+${gap}` : `${gap}`,
          unit: 'units surplus' + (gap < 0 ? ' (shortfall)' : ''),

  /* ── 11. Line Balancing Helper ───────────────────────────────── */
  {
    id: 'line-balancing',
    name: 'Line Balancing Helper',
    category: 'lean',
    emoji: '⚖️',
    description: 'Evaluates workstation cycle times against takt time and calculates line efficiency and balance loss.',
    tags: ['line balancing', 'takt time', 'bottleneck', 'workstation', 'efficiency', 'lean', 'balance'],
    formula: 'Line Efficiency = Σ Task Times ÷ (# Stations × Takt Time) × 100',
    howToUse: [
      'Enter the takt time (from the Takt Time Calculator) to set your production pace.',
      'Enter the cycle time of each workstation (up to 6 stations).',
      'Any station with a cycle time > takt time is a bottleneck — highlighted in red.',
      'Line efficiency shows how well work is balanced. Target 85–95%.',
      'Balance delay = 100% − Line Efficiency, indicating wasted capacity.'
    ],
    example: {
      scenario: 'Takt = 5 min. Station times: 4.2, 5.1, 3.8, 4.7, 4.5 min.',
      inputs: { 'Takt Time': '5.0 min', 'Stations': '4.2 / 5.1 / 3.8 / 4.7 / 4.5' },
      output: 'Line Efficiency = 90.6% | Station 2 is bottleneck (5.1 > 5.0)'
    },
    inputs: [
      { id: 'takt',  label: 'Takt Time (min/unit)', type: 'number', placeholder: '5.0', tooltip: 'From your Takt Time Calculator result' },
      { id: 'ws1',   label: 'Station 1 Cycle Time (min)', type: 'number', placeholder: '4.2' },
      { id: 'ws2',   label: 'Station 2 Cycle Time (min)', type: 'number', placeholder: '5.1' },
      { id: 'ws3',   label: 'Station 3 Cycle Time (min)', type: 'number', placeholder: '3.8' },
      { id: 'ws4',   label: 'Station 4 Cycle Time (min)', type: 'number', placeholder: '4.7' },
      { id: 'ws5',   label: 'Station 5 Cycle Time (optional)', type: 'number', placeholder: '' },
      { id: 'ws6',   label: 'Station 6 Cycle Time (optional)', type: 'number', placeholder: '' },
    ],
    calculate(v) {
      if (!v.takt) return [];
      const stations = [v.ws1, v.ws2, v.ws3, v.ws4, v.ws5, v.ws6].filter(x => x > 0);
      if (!stations.length) return [];
      const sum       = stations.reduce((a, b) => a + b, 0);
      const n         = stations.length;
      const lineEff   = (sum / (n * v.takt)) * 100;
      const balDelay  = 100 - lineEff;
      const bottleneck= Math.max(...stations);
      const bottleIdx = stations.indexOf(bottleneck) + 1;
      const hasBottle = bottleneck > v.takt;
      let type = 'good';
      if (lineEff < 75) type = 'bad';
      else if (lineEff < 85) type = 'warning';
      const results = [
        { label: 'Line Efficiency', value: lineEff.toFixed(1), unit: '%', type,
          note: lineEff >= 85 ? '✅ Well balanced.' : '⚠️ Rebalance work elements to improve efficiency.' },
        { label: 'Balance Delay',   value: balDelay.toFixed(1), unit: '%',
          note: `${(balDelay / 100 * n * v.takt).toFixed(1)} min of idle capacity per cycle` },

          note: hasBottle

    renderTool(container) {
      let rowId = 0;

      function makeRow(id) {
        return `<tr data-row="${id}">
          <td><input class="ba-input" data-field="metric" placeholder="e.g. Defect Rate"></td>
          <td><input class="ba-input" data-field="before" type="number" placeholder="0" style="width:80px"></td>

          <td><input class="ba-input" data-field="unit"   placeholder="%" style="width:60px"></td>
          <td><span class="ba-delta neutral" data-delta="${id}">—</span></td>
          <td><button class="ba-remove" data-remove="${id}" title="Remove">✕</button></td>
        </tr>`;
      }

      function calcDelta(row) {
        const b = parseFloat(row.querySelector('[data-field="before"]').value);
        const a = parseFloat(row.querySelector('[data-field="after"]').value);
        const unit = row.querySelector('[data-field="unit"]').value.trim();
        const span = row.querySelector('[data-delta]');
        if (isNaN(b) || isNaN(a) || b === 0) { span.textContent = '—'; span.className = 'ba-delta neutral'; return; }
        const pct = ((a - b) / Math.abs(b)) * 100;
        const sign = pct > 0 ? '+' : '';
        span.textContent = `${sign}${pct.toFixed(1)}%`;
        // Improvement direction: lower is better for defects/time, higher is better for yield/output
        // We let the user interpret — green = changed, red = no change isn't right
        // Better heuristic: just show direction with neutral color, user reads the numbers
        span.className = 'ba-delta ' + (pct < 0 ? 'down' : pct > 0 ? 'up' : 'neutral');
      }

      function updateSummary() {
        const rows = table.querySelectorAll('tbody tr');
        let improved = 0, worsened = 0, unchanged = 0;
        rows.forEach(row => {
          const b = parseFloat(row.querySelector('[data-field="before"]').value);
          const a = parseFloat(row.querySelector('[data-field="after"]').value);
          if (isNaN(b) || isNaN(a)) return;
          if (a < b) improved++;
          else if (a > b) worsened++;
          else unchanged++;
        });
        document.getElementById('ba-sum-improved').textContent  = improved;
        document.getElementById('ba-sum-worsened').textContent  = worsened;
        document.getElementById('ba-sum-unchanged').textContent = unchanged;
      }

      container.innerHTML = `<div class="ds-body">

          <div class="ds-label">Summary</div>

          </div>
        </div>
      </div>`;

      const table = container.querySelector('#ba-table');
      rowId = 2;

      table.addEventListener('input', e => {
        const row = e.target.closest('tr');
        if (row) { calcDelta(row); updateSummary(); }
      });

      table.addEventListener('click', e => {
        const btn = e.target.closest('[data-remove]');
        if (btn) {

  /* ── 17. Little's Law Calculator ─────────────────────────────────── */
  {
    id: 'littles-law',
    name: "Little's Law Calculator",
    category: 'capacity',
    emoji: '🔁',
    description: "Applies Little's Law (L = λW) to relate WIP, throughput rate, and average cycle time — solve for any one given the other two.",
    tags: ["little's law", 'WIP', 'throughput', 'cycle time', 'queuing', 'flow'],
    formula: 'L = λ × W   (WIP = Throughput Rate × Avg. Time in System)',
    howToUse: [
      'L = average number of items in the system (WIP).',
      'λ (lambda) = average throughput rate (units per hour).',
      'W = average time each unit spends in the system (hours).',
      'Fill in any two values — the calculator solves for the third.',
      'Use this to size WIP limits, predict lead times, or validate flow assumptions.'
    ],
    example: {
      scenario: 'A work cell processes 20 units/hr and each unit spends an average of 2.5 hours in the cell.',
      inputs: { 'λ (Rate)': '20 u/hr', 'W (Time)': '2.5 hr', 'L (WIP)': 'solve' },
      output: 'L = 50 units in system'
    },
    inputs: [
      { id: 'L',      label: 'L — Avg. WIP / Items in System',     type: 'number', placeholder: '', tooltip: 'Leave blank to solve for WIP' },
      { id: 'lambda', label: 'λ — Throughput Rate (units / hr)',    type: 'number', placeholder: '', tooltip: 'Leave blank to solve for throughput rate' },
      { id: 'W',      label: 'W — Avg. Time in System (hr)',        type: 'number', placeholder: '', tooltip: 'Leave blank to solve for avg. time in system' }
    ],
    calculate(v) {
      const filled = [v.L > 0, v.lambda > 0, v.W > 0].filter(Boolean).length;
      if (filled < 2) return [];
      let L = v.L, lambda = v.lambda, W = v.W;
      if (!L && lambda && W)      { L      = lambda * W;      return [{ label: 'L — Avg. WIP',            value: L.toFixed(2),      unit: 'items in system',    note: `At ${lambda} u/hr throughput with ${W} hr avg time, expect ${L.toFixed(1)} items in the system.` }]; }
      if (!lambda && L && W)      { lambda = L / W;           return [{ label: 'λ — Throughput Rate',     value: lambda.toFixed(2),  unit: 'units / hr',         note: `To keep WIP at ${L} items with ${W} hr avg time, throughput must be ${lambda.toFixed(2)} u/hr.` }]; }
      if (!W && L && lambda)      { W      = L / lambda;      return [{ label: 'W — Avg. Time in System', value: W.toFixed(3),       unit: 'hr',                 note: `${(W*60).toFixed(1)} minutes avg time per unit. ${W.toFixed(2)} hr × ${lambda} u/hr = ${L} WIP.` }]; }
      // All three filled — verify consistency
      const LCheck = lambda * W;
      const err = Math.abs(LCheck - L) / L * 100;
      return [{ label: "Little's Law Check", value: LCheck.toFixed(2), unit: 'expected WIP', type: err < 5 ? 'good' : 'warning',
        note: err < 5 ? `✅ Consistent — L = λW holds (${err.toFixed(1)}% error).` : `⚠️ Inconsistent — expected L = ${LCheck.toFixed(2)}, entered L = ${L}. Check your inputs.` }];
    }
  },

  {
    id: 'productivity-roi',
    name: 'Productivity Improvement ROI',
    category: 'labor',
    emoji: '📈',
    description: 'Calculates the financial return on investment for a productivity improvement initiative based on output gain and implementation cost.',
    tags: ['ROI', 'productivity', 'improvement', 'return on investment', 'labor', 'efficiency', 'kaizen'],
    formula: 'ROI = (Annual Net Savings ÷ Investment) × 100  |  Payback = Investment ÷ Annual Savings',
    howToUse: [
      'Enter current and improved productivity rates (units per hour).',
      'Enter the hourly labor cost and annual operating hours.',
      'Enter the total implementation cost (training, tooling, downtime, etc.).',
      'ROI shows the annualized return; payback period shows how fast you recover the investment.'
    ],
    example: {
      scenario: 'Current: 18 u/hr → Improved: 24 u/hr. Labor cost: $32/hr. 4,000 hrs/yr. Investment: $15,000.',
      inputs: { 'Current Rate': '18 u/hr', 'New Rate': '24 u/hr', 'Labor Cost': '$32/hr', 'Hrs/Yr': '4,000', 'Investment': '$15,000' },
      output: 'ROI = 51% | Payback = 23 months'
    },
    inputs: [
      { id: 'currentRate', label: 'Current Productivity (units / hr)',    type: 'number', placeholder: '18' },
      { id: 'newRate',     label: 'Improved Productivity (units / hr)',   type: 'number', placeholder: '24' },
      { id: 'laborCost',   label: 'Hourly Labor Cost ($/hr)',             type: 'number', placeholder: '32',   tooltip: 'Fully-loaded: wages + benefits + overhead' },
      { id: 'annualHrs',   label: 'Annual Operating Hours',               type: 'number', placeholder: '4000' },
      { id: 'investment',  label: 'Total Implementation Cost ($)',         type: 'number', placeholder: '15000', tooltip: 'Training, tooling, downtime, consulting, etc.' }
    ],
    calculate(v) {
      if (!v.currentRate || !v.newRate || !v.laborCost || !v.annualHrs || !v.investment) return [];
      if (v.newRate <= v.currentRate) return [{ label: 'Productivity Change', value: '0%', unit: '', type: 'warning', note: '⚠️ Improved rate must be greater than current rate.' }];
      const gainPct        = ((v.newRate - v.currentRate) / v.currentRate) * 100;
      // Annual savings = value of extra units × equivalent labor cost
      // Equivalently: same output achieved with fewer hours → savings = labor_cost × hrs_saved
      const hrsSaved       = v.annualHrs * (1 - v.currentRate / v.newRate);
      const annualSavings  = hrsSaved * v.laborCost;
      const roi            = (annualSavings / v.investment) * 100;
      const paybackMonths  = (v.investment / annualSavings) * 12;
      return [
        { label: 'Productivity Gain',    value: `${gainPct.toFixed(1)}%`,  unit: 'improvement',
          note: `+${(v.newRate - v.currentRate).toFixed(1)} units/hr → ${hrsSaved.toFixed(0)} labor hours saved per year` },
        { label: 'Annual Labor Savings', value: `$${Math.round(annualSavings).toLocaleString()}`, unit: '/ year' },
        { label: 'ROI',                  value: `${roi.toFixed(0)}%`,       unit: 'annual return', type: roi >= 50 ? 'good' : roi >= 20 ? 'warning' : 'bad',
          note: roi >= 50 ? '✅ Strong ROI.' : roi >= 20 ? '⚠️ Moderate ROI — verify assumptions.' : '🔴 Low ROI — revisit scope or cost.' },
        { label: 'Payback Period',       value: paybackMonths < 12 ? `${paybackMonths.toFixed(1)} months` : `${(paybackMonths/12).toFixed(1)} years`,
          unit: '', type: paybackMonths <= 18 ? 'good' : paybackMonths <= 36 ? 'warning' : 'bad' }
      ];
    }
  },
